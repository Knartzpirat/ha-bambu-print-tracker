        sequence:
          - variables:
              elapsed_h: >-
                {{ ((now().timestamp() - states(nozzle_2_heating_start_var) | float(0)) / 3600) | round(2) }}
          - choose:
              - conditions: "{{ nozzle_2_hours_helper_var != '' and elapsed_h > 0 }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ nozzle_2_hours_helper_var }}"
                    data:
                      value: >-
                        {{ (states(nozzle_2_hours_helper_var) | float(0) + elapsed_h) | round(2) }}
          - action: input_number.set_value
            target:
              entity_id: "{{ nozzle_2_heating_start_var }}"
            data:
              value: "0"

      # -----------------------------------------------------------------------
      # Fortschritts-Update
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Progress
          - condition: template
            value_template: "{% set old = trigger.from_state.state | default(-1) | float(-1)
              %} {% set new = trigger.to_state.state | default(-1) | float(-1)
              %} {% set interval = progress_interval_var | float(5) %}

              {% set quiet_enabled = enable_quiet_time_var %} {% set is_quiet =
              false %} {% if quiet_enabled %}

              \  {% set q_start = today_at(quiet_time_start_var) %}

              \  {% set q_end = today_at(quiet_time_end_var) %}

              \  {% if q_start < q_end %}

              \    {% set is_quiet = q_start <= now() <= q_end %}

              \  {% else %}

              \    {% set is_quiet = now() >= q_start or now() <= q_end %}

              \  {% endif %}

              {% endif %}

              {% set is_snoozed = false %} {% set snooze_helper =
              snooze_datetime_helper_var %} {% if snooze_helper != '' and
              states(snooze_helper) not in ['unknown', 'unavailable'] %}

              \  {% if state_attr(snooze_helper, 'timestamp') != None %}

              \    {% set is_snoozed = now().timestamp() <
              state_attr(snooze_helper, 'timestamp') %}

              \  {% endif %}

              {% endif %}

              {{ old >= 0 and new > old and new < 100 and (new // interval) >
              (old // interval) and not is_quiet and not is_snoozed }}\n"
        sequence:
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    title: "{{ printer_name_var }} – {{ t.print_update }} | {{ states(printer_task_name_var) }}"
                    message: "{{ t.print_progress }} | {{ states(printer_progress_var) | int(0) }} % {% if
                      printer_remaining_time_var %} {% set remain_state =
                      states(printer_remaining_time_var) %} {% if remain_state
                      not in ['unknown', 'unavailable', ''] %} {% set
                      remain_mins = remain_state | int(0) %} {% set h =
                      remain_mins // 60 %} {% set m = remain_mins % 60 %} ⏳
                      {{ t.remaining }}: {% if h > 0 %}{{ h }}h {% endif %}{{ m }}m {%
                      endif %} {% endif %}\n"
                    data:
                      progress: "{{ states(printer_progress_var) | int(0) }}"
                      progress_max: 100
                      live_update: true
                      critical_text: "{{ states(printer_progress_var) | int(0) }} %"
                      alert_once: true
                      chronometer: true
                      sticky: true
                      persistent: true
                      tag: "{{ states(printer_task_name_var) }}"
                      notification_icon: mdi:progress-alert
                      icon_url: "{% if printer_camera_var %}

                        \  /api/camera_proxy/{{ printer_camera_var }}

                        {% else %}

                        \  {{ state_attr(printer_cover_image_var,
                        'entity_picture') }}

                        {% endif %}"
                      actions: "{{

                        \  [

                        \    {\"action\": \"URI\", \"title\":
                        action_1_title_var, \"uri\": action_1_uri_var},

                        \    {\"action\": \"URI\", \"title\":
                        action_2_camera_title_var if printer_camera_var else
                        action_2_fallback_title_var, \"uri\": (\"entityId:\" ~
                        printer_camera_var) if printer_camera_var else
                        action_2_fallback_uri_var}

                        \  ]

                        \  + ([{

                        \       \"action\": \"BAMBU_MUTE_\" ~
                        printer_status_var,\ 

                        \       \"title\": (\"🔇 \" ~ t.snooze),\ 

                        \       \"behavior\": \"textInput\",

                        \       \"textInputButtonTitle\": t.mute,

                        \       \"textInputPlaceholder\": \"Min...\"

                        \     }] if button_3_mode_var == 'Mute Progress' else
                        [])

                        \  + ([{\"action\": \"BAMBU_CUSTOM_\" ~
                        printer_status_var, \"title\":
                        button_3_custom_title_var}] if button_3_mode_var ==
                        'Custom Action' else [])

                        }}"

      # -----------------------------------------------------------------------
      # Druck abgeschlossen / fehlgeschlagen
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id:
              - Print Complete
              - Print failed
        sequence:
          # --- Snooze-Helfer zurücksetzen ---
          - choose:
              - conditions: "{{ snooze_datetime_helper_var != '' }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ snooze_datetime_helper_var }}"
                    data:
                      timestamp: "{{ now().timestamp() }}"
          # --- Fortschritts-Benachrichtigung löschen ---
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    message: clear_notification
                    data:
                      tag: "{{ states(printer_task_name_var) }}"
          # --- Abschluss-/Fehler-Benachrichtigung senden ---
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    title: "{{ printer_name_var }} – {{ t.log_name }} {{ t.complete if trigger.id == 'Print Complete' else
                      t.failed }} – {{ states(printer_task_name_var) }}"
                    message: "{% set total_weight = states(printer_weight_var) | string |
                      replace(',', '.') | float(0) %} {% set progress =
                      states(printer_progress_var) | string | replace(',', '.')
                      | float(100) if trigger.id == 'Print failed' else 100.0 %}
                      {% set weight = total_weight * (progress / 100) %} {% set
                      fil_cost_per_kg = filament_cost_per_kg_var | string |
                      replace(',', '.') | float(0) %} {% set fil_cost = (weight
                      / 1000) * fil_cost_per_kg %}

                      {% set energy_cost = 0 %} {% set usage = 0 %} {% if
                      enable_energy_tracking_var and start_kwh_helper_var != ''
                      %}

                      \  {% set usage = (states(energy_sensor_var) | string |
                      replace(',', '.') | float(0) -
                      states(start_kwh_helper_var) | string | replace(',', '.')
                      | float(0)) %}

                      \  {% set dynamic_price =
                      states(electricity_price_sensor_var) %}

                      \  {% set elec_price = dynamic_price | string |
                      replace(',', '.') | float(static_electricity_price_var |
                      string | replace(',', '.') | float(0)) if dynamic_price
                      not in ['unknown', 'unavailable', ''] else
                      static_electricity_price_var | string | replace(',', '.')
                      | float(0) %}

                      \  {% set energy_cost = usage * elec_price %}

                      {% endif %}

                      {% if trigger.id == 'Print failed' %} ⚠️ {{ t.failed_at }}
                      {{ progress | round(0) }}% {% endif %} ⏱️ {{ t.duration }}: {{
                      ((states(printer_end_time_var) | as_timestamp(0) -
                      states(printer_start_time_var) | as_timestamp(0)) / 60) |
                      int(0) }} min

                      📊 {{ t.filament_usage }}: {% if filament_weight_unit_var == 'kg' %}{{ (weight / 1000) }} kg{% else %}{{ weight }} g{% endif %} {% if
                      enable_energy_tracking_var and start_kwh_helper_var != ''
                      %}{{ t.energy }}: {{ usage | round(2) }} kWh{% endif %}

                      {% if fil_cost > 0 or (enable_energy_tracking_var and
                      start_kwh_helper_var != '') %} 💰 {{ t.cost_breakdown }} {%
                      if fil_cost > 0 %}{{ t.filament }}: {{ currency }}{{ \"%.2f\" |
                      format(fil_cost) }}{% endif %} {% if
                      enable_energy_tracking_var and start_kwh_helper_var != ''
                      %}{{ t.energy }}: {{ currency }}{{ \"%.2f\" | format(energy_cost) }}{% endif
                      %} {{ t.total_cost }}: {{ currency }}{{ \"%.2f\" | format(fil_cost +
                      energy_cost) }} {% endif %}\n"
                    data:
                      color: "{{ 'green' if trigger.id == 'Print Complete' else 'red' }}"
                      icon_url: "{% if printer_camera_var %}

                        \  /api/camera_proxy/{{ printer_camera_var }}

                        {% else %}

                        \  {{ state_attr(printer_cover_image_var,
                        'entity_picture') }}

                        {% endif %}"
                      actions: "{{

                        \  [

                        \    {\"action\": \"URI\", \"title\":
                        action_1_title_var, \"uri\": action_1_uri_var},

                        \    {\"action\": \"URI\", \"title\":
                        action_2_camera_title_var if printer_camera_var else
                        action_2_fallback_title_var, \"uri\": (\"entityId:\" ~
                        printer_camera_var) if printer_camera_var else
                        action_2_fallback_uri_var}

                        \  ]

                        \  + ([{\"action\": \"BAMBU_CUSTOM_\" ~
                        printer_status_var, \"title\":
                        button_3_custom_title_var}] if button_3_mode_var ==
                        'Custom Action' else [])

                        }}"

          # =====================================================================
          # Düsen-Heizzeiten flushen (falls Düse bei Druckende noch heiß)
          # =====================================================================
          # Düse 1 – offene Heizsession abschließen
          - choose:
              - conditions: >-
                  {{ enable_nozzle_tracking_var
                     and nozzle_1_heating_start_var != ''
                     and states(nozzle_1_heating_start_var) | float(0) > 0 }}
                sequence:
                  - variables:
                      elapsed_h: >-
                        {{ ((now().timestamp() - states(nozzle_1_heating_start_var) | float(0)) / 3600) | round(2) }}
                  - choose:
                      - conditions: "{{ nozzle_1_hours_helper_var != '' and elapsed_h > 0 }}"
                        sequence:
                          - action: input_number.set_value
                            target:
                              entity_id: "{{ nozzle_1_hours_helper_var }}"
                            data:
                              value: >-
                                {{ (states(nozzle_1_hours_helper_var) | float(0) + elapsed_h) | round(2) }}
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ nozzle_1_heating_start_var }}"
                    data:
                      value: "0"
          # Düse 2 – offene Heizsession abschließen
          - choose:
              - conditions: >-
                  {{ enable_nozzle_tracking_var
                     and nozzle_2_heating_start_var != ''
                     and states(nozzle_2_heating_start_var) | float(0) > 0 }}
                sequence:
                  - variables:
                      elapsed_h: >-
                        {{ ((now().timestamp() - states(nozzle_2_heating_start_var) | float(0)) / 3600) | round(2) }}
                  - choose:
                      - conditions: "{{ nozzle_2_hours_helper_var != '' and elapsed_h > 0 }}"
                        sequence:
                          - action: input_number.set_value
                            target:
                              entity_id: "{{ nozzle_2_hours_helper_var }}"
                            data:
                              value: >-
                                {{ (states(nozzle_2_hours_helper_var) | float(0) + elapsed_h) | round(2) }}
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ nozzle_2_heating_start_var }}"
                    data:
                      value: "0"

          # =====================================================================
          # NEU: Wartungserinnerung Düse 1 prüfen und senden
          # =====================================================================
          - variables:
              nozzle_1_current_h: >-
                {{ states(nozzle_1_hours_helper_var) | string | replace(',',
                '.') | float(0) if nozzle_1_hours_helper_var != '' else 0 }}
              nozzle_1_snoozed: >-
                {% if nozzle_1_snooze_helper_var != '' and
                states(nozzle_1_snooze_helper_var) not in ['unknown',
                'unavailable'] %}
                  {% if state_attr(nozzle_1_snooze_helper_var, 'timestamp') != None %}
                    {{ now().timestamp() < state_attr(nozzle_1_snooze_helper_var, 'timestamp') }}
                  {% else %}
                    false
                  {% endif %}
                {% else %}
                  false
                {% endif %}
              nozzle_1_needs_maintenance: >-
                {{ enable_nozzle_tracking_var and nozzle_1_hours_helper_var !=
                '' and nozzle_1_current_h >= (nozzle_1_maintenance_interval_var
                | float(200)) and not nozzle_1_snoozed }}
          - choose:
              - conditions: "{{ nozzle_1_needs_maintenance }}"
                sequence:
                  - repeat:
                      for_each: !input notify_device
                      sequence:
                        - variables:
                            notify_service: "{% set tracker = device_entities(repeat.item) |
                              select('search', '^device_tracker\\.') | first |
                              default('') %} {% if tracker %}

                              \  notify.mobile_app_{{ tracker.split('.')[1] }}

                              {% else %}

                              \  notify.mobile_app_{{ device_attr(repeat.item,
                              'name') | slugify | replace('-', '_') }}

                              {% endif %}"
                        - action: "{{ notify_service }}"
                          data:
                            title: "🔧 {{ printer_name_var }} – {{ t.nozzle_maint }} – {{ nozzle_1_label }}"
                            message: >-
                              {{ nozzle_1_label }}
                              {{ t.nozzle_msg | replace('[H]', nozzle_1_current_h | round(1) | string) | replace('[I]', nozzle_1_maintenance_interval_var | string) }}
                            data:
                              tag: bambu_nozzle_1_maintenance_{{ printer_status_var }}
                              sticky: true
                              persistent: true
                              notification_icon: mdi:wrench-alert
                              color: orange
                              actions:
                                - action: BAMBU_NOZZLE_1_DONE_{{ printer_status_var }}
                                  title: "✅ {{ t.maint_done }}"
                                - action: BAMBU_NOZZLE_1_SNOOZE_{{ printer_status_var }}
                                  title: "⏰ {{ t.remind_in }}"
                                  behavior: textInput
                                  textInputButtonTitle: "{{ t.hours_btn }}"
                                  textInputPlaceholder: "{{ t.eg }} 24"

          # =====================================================================
          # NEU: Wartungserinnerung Düse 2 prüfen und senden
          # =====================================================================
          - variables:
              nozzle_2_current_h: >-
                {{ states(nozzle_2_hours_helper_var) | string | replace(',',
                '.') | float(0) if nozzle_2_hours_helper_var != '' else 0 }}
              nozzle_2_snoozed: >-
                {% if nozzle_2_snooze_helper_var != '' and
                states(nozzle_2_snooze_helper_var) not in ['unknown',
                'unavailable'] %}
                  {% if state_attr(nozzle_2_snooze_helper_var, 'timestamp') != None %}
                    {{ now().timestamp() < state_attr(nozzle_2_snooze_helper_var, 'timestamp') }}
                  {% else %}
                    false
                  {% endif %}
                {% else %}
                  false
                {% endif %}
              nozzle_2_needs_maintenance: >-
                {{ enable_nozzle_tracking_var and nozzle_2_hours_helper_var !=
                '' and nozzle_2_current_h >= (nozzle_2_maintenance_interval_var
                | float(200)) and not nozzle_2_snoozed }}
          - choose:
              - conditions: "{{ nozzle_2_needs_maintenance }}"
                sequence:
                  - repeat:
                      for_each: !input notify_device
                      sequence:
                        - variables:
                            notify_service: "{% set tracker = device_entities(repeat.item) |
                              select('search', '^device_tracker\\.') | first |
                              default('') %} {% if tracker %}

                              \  notify.mobile_app_{{ tracker.split('.')[1] }}

                              {% else %}

                              \  notify.mobile_app_{{ device_attr(repeat.item,
                              'name') | slugify | replace('-', '_') }}

                              {% endif %}"
                        - action: "{{ notify_service }}"
                          data:
                            title: "🔧 {{ printer_name_var }} – {{ t.nozzle_maint }} – {{ nozzle_2_label }}"
                            message: >-
                              {{ nozzle_2_label }}
                              {{ t.nozzle_msg | replace('[H]', nozzle_2_current_h | round(1) | string) | replace('[I]', nozzle_2_maintenance_interval_var | string) }}
                            data:
                              tag: bambu_nozzle_2_maintenance_{{ printer_status_var }}
                              sticky: true
                              persistent: true
                              notification_icon: mdi:wrench-alert
                              color: orange
                              actions:
                                - action: BAMBU_NOZZLE_2_DONE_{{ printer_status_var }}
                                  title: "✅ {{ t.maint_done }}"
                                - action: BAMBU_NOZZLE_2_SNOOZE_{{ printer_status_var }}
                                  title: "⏰ {{ t.remind_in }}"
                                  behavior: textInput
                                  textInputButtonTitle: "{{ t.hours_btn }}"
                                  textInputPlaceholder: "{{ t.eg }} 24"

          # =====================================================================
          # NEU: Druck-Protokollierung (Logbuch + opt. HA-Benachrichtigung)
          # =====================================================================
          - choose:
              - conditions: "{{ enable_logging_var and log_helper_entity_var != '' }}"
                sequence:
                  - variables:
                      log_progress: >-
                        {{ states(printer_progress_var) | string | replace(',',
                        '.') | float(100) if trigger.id == 'Print failed' else
                        100.0 }}
                      log_total_weight: >-
                        {{ states(printer_weight_var) | string | replace(',',
                        '.') | float(0) }}
                      log_weight: >-
                        {{ log_total_weight * (log_progress / 100) }}
                      log_fil_cost_per_kg: >-
                        {{ filament_cost_per_kg_var | string | replace(',', '.')
                        | float(0) }}
                      log_fil_cost: >-
                        {{ (log_weight / 1000) * log_fil_cost_per_kg }}
                      log_usage_kwh: >-
                        {% if enable_energy_tracking_var and
                        start_kwh_helper_var != '' %}
                          {{ (states(energy_sensor_var) | string | replace(',', '.') | float(0) -
                             states(start_kwh_helper_var) | string | replace(',', '.') | float(0)) }}
                        {% else %}
                          0
                        {% endif %}
                      log_elec_price: >-
                        {% if enable_energy_tracking_var and
                        start_kwh_helper_var != '' %}
                          {% set dp = states(electricity_price_sensor_var) %}
                          {{ dp | string | replace(',', '.') | float(static_electricity_price_var | string | replace(',', '.') | float(0))
                             if dp not in ['unknown', 'unavailable', ''] else
                             static_electricity_price_var | string | replace(',', '.') | float(0) }}
                        {% else %}
                          0
                        {% endif %}
                      log_energy_cost: >-
                        {{ log_usage_kwh * log_elec_price }}
                      log_duration_min: >-
                        {{ ((states(printer_end_time_var) | as_timestamp(0) -
                        states(printer_start_time_var) | as_timestamp(0)) / 60)
                        | int(0) }}
                      log_filaments: >-
                        {% if filament_log_helper_var != '' and
                           states(filament_log_helper_var) not in ['unknown', 'unavailable', ''] %}
                          {{ states(filament_log_helper_var) }}
                        {% else %}
                          –
                        {% endif %}
                      log_message: >-
                        {{ '✅' if trigger.id == 'Print Complete' else '❌' }} {{
                        states(printer_task_name_var) }} | {{ t.date_lbl }}: {{
                        now().strftime(t.date_fmt) }} | {{ t.duration }}: {{
                        (log_duration_min // 60) }}h {{ (log_duration_min % 60)
                        }}m | {{ t.progress_lbl }}: {{ log_progress | round(0) | int }}%
                        | Filament: {% if filament_weight_unit_var == 'kg' %}{{ (log_weight / 1000) }} kg{% else %}{{ log_weight }} g{% endif %} {% if
                        log_filaments != '–' %}| {{ t.materials }}: {{ log_filaments
                        }}{% endif %} {% if printer_nozzle_size_sensor_var != ''
                        and states(printer_nozzle_size_sensor_var) not in
                        ['unknown','unavailable',''] %}| {{ t.nozzle_size }}: {{
                        states(printer_nozzle_size_sensor_var) }}{% endif %} {%
                        if printer_bed_temp_sensor_var != '' and
                        states(printer_bed_temp_sensor_var) not in
                        ['unknown','unavailable',''] %}| Ø {{ t.bed_temp }}: {{
                        states(printer_bed_temp_sensor_var) }}°C{% endif %} {%
                        if printer_nozzle_1_temp_sensor_var != '' and
                        states(printer_nozzle_1_temp_sensor_var) not in
                        ['unknown','unavailable',''] %}| Ø {{ nozzle_1_label }}: {{
                        states(printer_nozzle_1_temp_sensor_var) }}°C{% endif %}
                        {% if printer_nozzle_2_temp_sensor_var != '' and
                        states(printer_nozzle_2_temp_sensor_var) not in
                        ['unknown','unavailable',''] %}| Ø {{ nozzle_2_label }}: {{
                        states(printer_nozzle_2_temp_sensor_var) }}°C{% endif %}
                        {% if enable_nozzle_tracking_var %}| {{ t.nozzle_type }}:
                        {{ nozzle_1_label }}={{ nozzle_1_type_var }},
                        {{ nozzle_2_label }}={{ nozzle_2_type_var }}{% endif %}
                        {% if printer_bed_type_sensor_var != '' and
                        states(printer_bed_type_sensor_var) not in
                        ['unknown','unavailable',''] %}| {{ t.print_bed }}: {{
                        states(printer_bed_type_sensor_var) }}{% endif %} {% if
                        printer_tool_module_sensor_var != '' and
                        states(printer_tool_module_sensor_var) not in
                        ['unknown','unavailable','none','None',''] %}|
                        {{ t.tool_module }}: {{ states(printer_tool_module_sensor_var)
                        }}{% endif %} | {{ t.filament_cost }}: {{ currency }}{{ "%.2f" |
                        format(log_fil_cost) }} {% if enable_energy_tracking_var
                        and start_kwh_helper_var != '' %}| {{ t.energy }}: {{
                        log_usage_kwh | round(2) }} kWh ({{ currency }}{{ "%.2f" |
                        format(log_energy_cost) }}){% endif %} | {{ t.total }}: {{ currency }}{{
                        "%.2f" | format(log_fil_cost + log_energy_cost) }}
                  # Logbuch-Eintrag
                  - action: logbook.log
                    data:
                      name: "{{ printer_name_var }} – {{ t.log_name }} – {{ states(printer_task_name_var) }}"
                      message: "{{ log_message }}"
                      entity_id: "{{ log_helper_entity_var }}" # ← Apostroph am Ende fehlt!
                  - action: input_text.set_value
                    target:
                      entity_id: "{{ log_helper_entity_var }}"
                    data:
                      value: "{{ log_message[:255] }}"
                  # Optional: Persistente HA-Benachrichtigung

                  - choose:
                      - conditions: "{{ log_ha_notification_var }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: "📋 {{ printer_name_var }} – {{ t.print_log }} – {{ states(printer_task_name_var) }}"
                              message: "{{ log_message }}"
                              notification_id: "bambu_log_{{ states(printer_task_name_var) | slugify }}_{{
                                now().timestamp() | int }}"

          # =====================================================================
          # Gesamtzähler aktualisieren (Energie + Kosten)
          # =====================================================================
          - variables:
              print_total_weight: >-
                {% set tw = states(printer_weight_var) | string | replace(',', '.') | float(0) %}
                {% set prog = states(printer_progress_var) | string | replace(',', '.') | float(100)
                   if trigger.id == 'Print failed' else 100.0 %}
                {{ tw * (prog / 100) }}
              print_fil_cost: >-
                {{ (print_total_weight / 1000) * (filament_cost_per_kg_var | string | replace(',', '.') | float(0)) }}
              print_energy_kwh: >-
                {% if enable_energy_tracking_var and start_kwh_helper_var != '' %}
                  {{ (states(energy_sensor_var) | string | replace(',', '.') | float(0) -
                     states(start_kwh_helper_var) | string | replace(',', '.') | float(0)) }}
                {% else %}
                  0
                {% endif %}
              print_elec_price: >-
                {% if enable_energy_tracking_var and start_kwh_helper_var != '' %}
                  {% set dp = states(electricity_price_sensor_var) %}
                  {{ dp | string | replace(',', '.') | float(static_electricity_price_var | string | replace(',', '.') | float(0))
                     if dp not in ['unknown', 'unavailable', ''] else
                     static_electricity_price_var | string | replace(',', '.') | float(0) }}
                {% else %}
                  0
                {% endif %}
              print_energy_cost: "{{ print_energy_kwh | float(0) * print_elec_price | float(0) }}"
              print_total_cost: "{{ print_fil_cost | float(0) + print_energy_cost | float(0) }}"
          # Gesamtenergie aktualisieren
          - choose:
              - conditions: "{{ total_energy_helper_var != '' and enable_energy_tracking_var }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ total_energy_helper_var }}"
                    data:
                      value: >-
                        {{ (states(total_energy_helper_var) | float(0) + print_energy_kwh | float(0)) | round(2) }}
          # Gesamtkosten aktualisieren
          - choose:
              - conditions: "{{ total_cost_helper_var != '' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ total_cost_helper_var }}"
                    data:
                      value: >-
                        {{ (states(total_cost_helper_var) | float(0) + print_total_cost | float(0)) | round(2) }}
          # Gesamt-Energiekosten aktualisieren
          - choose:
              - conditions: "{{ total_energy_cost_helper_var != '' and enable_energy_tracking_var }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ total_energy_cost_helper_var }}"
                    data:
                      value: >-
                        {{ (states(total_energy_cost_helper_var) | float(0) + print_energy_cost | float(0)) | round(2) }}
          # Gesamt-Filamentverbrauch aktualisieren
          - choose:
              - conditions: "{{ total_fil_usage_helper_var != '' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ total_fil_usage_helper_var }}"
                    data:
                      value: >-
                        {{ (states(total_fil_usage_helper_var) | float(0) + print_total_weight | float(0)) | round(2) }}
          # Gesamt-Filamentkosten aktualisieren
          - choose:
              - conditions: "{{ total_fil_cost_helper_var != '' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ total_fil_cost_helper_var }}"
                    data:
                      value: >-
                        {{ (states(total_fil_cost_helper_var) | float(0) + print_fil_cost | float(0)) | round(2) }}
