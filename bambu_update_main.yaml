  # --- Bestehende Variablen ---
  printer_status_var: !input printer_status
  printer_progress_var: !input printer_progress
  printer_task_name_var: !input printer_task_name
  printer_start_time_var: !input printer_start_time
  printer_end_time_var: !input printer_end_time
  printer_remaining_time_var: !input printer_remaining_time
  printer_weight_var: !input printer_weight
  printer_cover_image_var: !input printer_cover_image
  printer_camera_var: !input printer_camera
  enable_energy_tracking_var: !input enable_energy_tracking
  static_electricity_price_var: !input static_electricity_price
  electricity_price_sensor_var: !input electricity_price_sensor
  energy_sensor_var: !input energy_sensor
  start_kwh_helper_var: !input start_kwh_helper
  progress_interval_var: !input progress_interval
  filament_cost_per_kg_var: !input filament_cost_per_kg
  action_1_title_var: !input action_1_title
  action_1_uri_var: !input action_1_uri
  action_2_camera_title_var: !input action_2_camera_title
  action_2_fallback_title_var: !input action_2_fallback_title
  action_2_fallback_uri_var: !input action_2_fallback_uri
  button_3_mode_var: !input button_3_mode
  snooze_datetime_helper_var: !input snooze_datetime_helper
  button_3_custom_title_var: !input button_3_custom_title
  enable_quiet_time_var: !input enable_quiet_time
  quiet_time_start_var: !input quiet_time_start
  quiet_time_end_var: !input quiet_time_end
  # --- Neue Variablen: Protokollierung ---
  enable_logging_var: !input enable_logging
  log_ha_notification_var: !input log_ha_notification
  log_helper_entity_var: !input log_helper_entity
  printer_nozzle_size_sensor_var: !input printer_nozzle_size_sensor
  printer_active_slot_sensor_var: !input printer_active_slot_sensor
  filament_log_helper_var: !input filament_log_helper
  printer_bed_temp_sensor_var: !input printer_bed_temp_sensor
  printer_nozzle_1_temp_sensor_var: !input printer_nozzle_1_temp_sensor
  printer_nozzle_2_temp_sensor_var: !input printer_nozzle_2_temp_sensor
  printer_bed_type_sensor_var: !input printer_bed_type_sensor
  printer_tool_module_sensor_var: !input printer_tool_module_sensor
  # --- Neue Variablen: Düsen-Wartung ---
  enable_nozzle_tracking_var: !input enable_nozzle_tracking
  is_h2d_printer_var: !input is_h2d_printer
  nozzle_1_label: "{{ t.left_nozzle if is_h2d_printer_var else t.nozzle_1 }}"
  nozzle_2_label: "{{ t.right_nozzle if is_h2d_printer_var else t.nozzle_2 }}"
  nozzle_1_hours_helper_var: !input nozzle_1_hours_helper
  nozzle_2_hours_helper_var: !input nozzle_2_hours_helper
  nozzle_1_maintenance_interval_var: !input nozzle_1_maintenance_interval
  nozzle_2_maintenance_interval_var: !input nozzle_2_maintenance_interval
  nozzle_1_snooze_helper_var: !input nozzle_1_snooze_helper
  nozzle_2_snooze_helper_var: !input nozzle_2_snooze_helper

mode: parallel

# =========================================================================
# Trigger
# =========================================================================
trigger:
  - trigger: state
    entity_id: !input printer_status
    to: running
    from: prepare
    id: Print Started
  - trigger: state
    entity_id: !input printer_status
    to: finish
    from: running
    id: Print Complete
  - trigger: state
    entity_id: !input printer_status
    to: failed
    id: Print failed
  - trigger: state
    entity_id: !input printer_progress
    id: Progress
  - trigger: event
    event_type: mobile_app_notification_action
    id: App_Action
  - trigger: template
    value_template: >-
      {{ printer_active_slot_sensor_var != '' and
         states(printer_status_var) == 'running' and
         states(printer_active_slot_sensor_var) not in ['unknown', 'unavailable', '', 'Empty', 'empty'] }}
    id: Filament_Change

# =========================================================================
# Aktionen
# =========================================================================
action:
  - choose:

      # -----------------------------------------------------------------------
      # App-Aktion: Fortschritt stummschalten (Snooze)
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: App_Action
          - condition: template
            value_template: "{{ trigger.event.data.action == 'BAMBU_MUTE_' ~
              printer_status_var }}"
        sequence:
          - variables:
              requested_snooze: "{% if trigger.event.data.reply_text is defined and
                trigger.event.data.reply_text | regex_match('^\\\\d+$') %}

                \  {{ trigger.event.data.reply_text | int(60) }}

                {% else %}

                \  60

                {% endif %}"
              remain_state: "{{ states(printer_remaining_time_var) if
                printer_remaining_time_var != '' else 'unknown' }}"
              safe_snooze: "{% if remain_state not in ['unknown', 'unavailable', ''] %}

                \  {% set max_snooze = (remain_state | int(0)) - 5 %}

                \  {% set max_snooze = max_snooze if max_snooze > 0 else 1 %}

                \  {{ [requested_snooze, max_snooze] | min }}

                {% else %}

                \  {{ requested_snooze }}

                {% endif %}"
          - choose:
              - conditions: "{{ snooze_datetime_helper_var != '' }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ snooze_datetime_helper_var }}"
                    data:
                      timestamp: "{{ (now() + timedelta(minutes=requested_snooze)).timestamp() }}"
                  - repeat:
                      for_each: !input notify_device
                      sequence:
                        - variables:
                            notify_service: "{% set tracker = device_entities(repeat.item) |
                              select('search', '^device_tracker\\.') | first |
                              default('') %} {% if tracker %}

                              \  notify.mobile_app_{{ tracker.split('.')[1] }}

                              {% else %}

                              \  notify.mobile_app_{{ device_attr(repeat.item,
                              'name') | slugify | replace('-', '_') }}

                              {% endif %}"
                        - action: "{{ notify_service }}"
                          data:
                            message: clear_notification
                            data:
                              tag: "{{ states(printer_task_name_var) }}"
              - conditions: "{{ snooze_datetime_helper_var == '' }}"
                sequence:
                  - action: automation.turn_off
                    data:
                      stop_actions: false
                    target:
                      entity_id: "{{ this.entity_id }}"
                  - repeat:
                      for_each: !input notify_device
                      sequence:
                        - variables:
                            notify_service: "{% set tracker = device_entities(repeat.item) |
                              select('search', '^device_tracker\\.') | first |
                              default('') %} {% if tracker %}

                              \  notify.mobile_app_{{ tracker.split('.')[1] }}

                              {% else %}

                              \  notify.mobile_app_{{ device_attr(repeat.item,
                              'name') | slugify | replace('-', '_') }}

                              {% endif %}"
                        - action: "{{ notify_service }}"
                          data:
                            message: clear_notification
                            data:
                              tag: "{{ states(printer_task_name_var) }}"
                  - delay:
                      minutes: "{{ safe_snooze }}"
                  - action: automation.turn_on
                    data: {}
                    target:
                      entity_id: "{{ this.entity_id }}"

      # -----------------------------------------------------------------------
      # App-Aktion: Benutzerdefinierte Aktion
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: App_Action
          - condition: template
            value_template: "{{ trigger.event.data.action == 'BAMBU_CUSTOM_' ~
              printer_status_var }}"
        sequence: !input button_3_custom_action

      # -----------------------------------------------------------------------
      # NEU – App-Aktion: Wartung Düse 1 erledigt → Zähler zurücksetzen
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: App_Action
          - condition: template
            value_template: "{{ trigger.event.data.action == 'BAMBU_NOZZLE_1_DONE_' ~
              printer_status_var }}"
        sequence:
          - choose:
              - conditions: "{{ nozzle_1_hours_helper_var != '' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ nozzle_1_hours_helper_var }}"
                    data:
                      value: "0"
          - choose:
              - conditions: "{{ nozzle_1_snooze_helper_var != '' }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ nozzle_1_snooze_helper_var }}"
                    data:
                      timestamp: "{{ now().timestamp() }}"
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    message: clear_notification
                    data:
                      tag: bambu_nozzle_1_maintenance_{{ printer_status_var }}

      # -----------------------------------------------------------------------
      # NEU – App-Aktion: Wartung Düse 1 zurückstellen (Snooze in Stunden)
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: App_Action
          - condition: template
            value_template: "{{ trigger.event.data.action == 'BAMBU_NOZZLE_1_SNOOZE_' ~
              printer_status_var }}"
        sequence:
          - variables:
              nozzle_snooze_hours: "{% if trigger.event.data.reply_text is defined and
                trigger.event.data.reply_text | regex_match('^\\\\d+$') %}

                \  {{ trigger.event.data.reply_text | int(24) }}

                {% else %}

                \  24

                {% endif %}"
          - choose:
              - conditions: "{{ nozzle_1_snooze_helper_var != '' }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ nozzle_1_snooze_helper_var }}"
                    data:
                      timestamp: "{{ (now() + timedelta(hours=nozzle_snooze_hours)).timestamp() }}"
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    message: clear_notification
                    data:
                      tag: bambu_nozzle_1_maintenance_{{ printer_status_var }}

      # -----------------------------------------------------------------------
      # NEU – App-Aktion: Wartung Düse 2 erledigt → Zähler zurücksetzen
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: App_Action
          - condition: template
            value_template: "{{ trigger.event.data.action == 'BAMBU_NOZZLE_2_DONE_' ~
              printer_status_var }}"
        sequence:
          - choose:
              - conditions: "{{ nozzle_2_hours_helper_var != '' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ nozzle_2_hours_helper_var }}"
                    data:
                      value: "0"
          - choose:
              - conditions: "{{ nozzle_2_snooze_helper_var != '' }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ nozzle_2_snooze_helper_var }}"
                    data:
                      timestamp: "{{ now().timestamp() }}"
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    message: clear_notification
                    data:
                      tag: bambu_nozzle_2_maintenance_{{ printer_status_var }}

      # -----------------------------------------------------------------------
      # NEU – App-Aktion: Wartung Düse 2 zurückstellen (Snooze in Stunden)
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: App_Action
          - condition: template
            value_template: "{{ trigger.event.data.action == 'BAMBU_NOZZLE_2_SNOOZE_' ~
              printer_status_var }}"
        sequence:
          - variables:
              nozzle_snooze_hours: "{% if trigger.event.data.reply_text is defined and
                trigger.event.data.reply_text | regex_match('^\\\\d+$') %}

                \  {{ trigger.event.data.reply_text | int(24) }}

                {% else %}

                \  24

                {% endif %}"
          - choose:
              - conditions: "{{ nozzle_2_snooze_helper_var != '' }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ nozzle_2_snooze_helper_var }}"
                    data:
                      timestamp: "{{ (now() + timedelta(hours=nozzle_snooze_hours)).timestamp() }}"
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    message: clear_notification
                    data:
                      tag: bambu_nozzle_2_maintenance_{{ printer_status_var }}

      # -----------------------------------------------------------------------
      # Druck gestartet
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Print Started
        sequence:
          - choose:
              - conditions: "{{ enable_energy_tracking_var and start_kwh_helper_var != '' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ start_kwh_helper_var }}"
                    data:
                      value: "{{ states(energy_sensor_var) | string | replace(',', '.') | float(0) }}"
          # --- Filament-Log-Helper leeren ---
          - choose:
              - conditions: "{{ filament_log_helper_var != '' }}"
                sequence:
                  - action: input_text.set_value
                    target:
                      entity_id: "{{ filament_log_helper_var }}"
                    data:
                      value: ""

      # -----------------------------------------------------------------------
      # Filament-Wechsel: Material im Helper sammeln (dedupliziert)
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Filament_Change
        sequence:
          - choose:
              - conditions: "{{ filament_log_helper_var != '' }}"
                sequence:
                  - variables:
                      current_filament: "{{ states(printer_active_slot_sensor_var) }}"
                      existing_filaments: "{{ states(filament_log_helper_var) }}"
                      already_logged: >-
                        {{ current_filament in (existing_filaments.split(', ') if existing_filaments != '' else []) }}
                  - choose:
                      - conditions: "{{ not already_logged }}"
                        sequence:
                          - action: input_text.set_value
                            target:
                              entity_id: "{{ filament_log_helper_var }}"
                            data:
                              value: >-
                                {{ (existing_filaments ~ ', ' ~ current_filament) if existing_filaments != '' else current_filament }}

      # -----------------------------------------------------------------------
      # Fortschritts-Update
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Progress
          - condition: template
            value_template: "{% set old = trigger.from_state.state | default(-1) | float(-1)
              %} {% set new = trigger.to_state.state | default(-1) | float(-1)
              %} {% set interval = progress_interval_var | float(5) %}

              {% set quiet_enabled = enable_quiet_time_var %} {% set is_quiet =
              false %} {% if quiet_enabled %}

              \  {% set q_start = today_at(quiet_time_start_var) %}

              \  {% set q_end = today_at(quiet_time_end_var) %}

              \  {% if q_start < q_end %}

              \    {% set is_quiet = q_start <= now() <= q_end %}

              \  {% else %}

              \    {% set is_quiet = now() >= q_start or now() <= q_end %}

              \  {% endif %}

              {% endif %}

              {% set is_snoozed = false %} {% set snooze_helper =
              snooze_datetime_helper_var %} {% if snooze_helper != '' and
              states(snooze_helper) not in ['unknown', 'unavailable'] %}

              \  {% if state_attr(snooze_helper, 'timestamp') != None %}

              \    {% set is_snoozed = now().timestamp() <
              state_attr(snooze_helper, 'timestamp') %}

              \  {% endif %}

              {% endif %}

              {{ old >= 0 and new > old and new < 100 and (new // interval) >
              (old // interval) and not is_quiet and not is_snoozed }}\n"
        sequence:
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    title: "{{ t.print_update }} | {{ states(printer_task_name_var) }}"
                    message: "{{ t.print_progress }} | {{ states(printer_progress_var) | int(0) }} % {% if
                      printer_remaining_time_var %} {% set remain_state =
                      states(printer_remaining_time_var) %} {% if remain_state
                      not in ['unknown', 'unavailable', ''] %} {% set
                      remain_mins = remain_state | int(0) %} {% set h =
                      remain_mins // 60 %} {% set m = remain_mins % 60 %} ⏳
                      {{ t.remaining }}: {% if h > 0 %}{{ h }}h {% endif %}{{ m }}m {%
                      endif %} {% endif %}\n"
                    data:
                      progress: "{{ states(printer_progress_var) | int(0) }}"
                      progress_max: 100
                      live_update: true
                      critical_text: "{{ states(printer_progress_var) | int(0) }} %"
                      alert_once: true
                      chronometer: true
                      sticky: true
                      persistent: true
                      tag: "{{ states(printer_task_name_var) }}"
                      notification_icon: mdi:progress-alert
                      icon_url: "{% if printer_camera_var %}

                        \  /api/camera_proxy/{{ printer_camera_var }}

                        {% else %}

                        \  {{ state_attr(printer_cover_image_var,
                        'entity_picture') }}

                        {% endif %}"
                      actions: "{{

                        \  [

                        \    {\"action\": \"URI\", \"title\":
                        action_1_title_var, \"uri\": action_1_uri_var},

                        \    {\"action\": \"URI\", \"title\":
                        action_2_camera_title_var if printer_camera_var else
                        action_2_fallback_title_var, \"uri\": (\"entityId:\" ~
                        printer_camera_var) if printer_camera_var else
                        action_2_fallback_uri_var}

                        \  ]

                        \  + ([{

                        \       \"action\": \"BAMBU_MUTE_\" ~
                        printer_status_var,\ 

                        \       \"title\": (\"🔇 \" ~ t.snooze),\ 

                        \       \"behavior\": \"textInput\",

                        \       \"textInputButtonTitle\": t.mute,

                        \       \"textInputPlaceholder\": \"Min...\"

                        \     }] if button_3_mode_var == 'Mute Progress' else
                        [])

                        \  + ([{\"action\": \"BAMBU_CUSTOM_\" ~
                        printer_status_var, \"title\":
                        button_3_custom_title_var}] if button_3_mode_var ==
                        'Custom Action' else [])

                        }}"

      # -----------------------------------------------------------------------
      # Druck abgeschlossen / fehlgeschlagen
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id:
              - Print Complete
              - Print failed
        sequence:
          # --- Snooze-Helfer zurücksetzen ---
          - choose:
              - conditions: "{{ snooze_datetime_helper_var != '' }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ snooze_datetime_helper_var }}"
                    data:
                      timestamp: "{{ now().timestamp() }}"
          # --- Fortschritts-Benachrichtigung löschen ---
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    message: clear_notification
                    data:
                      tag: "{{ states(printer_task_name_var) }}"
          # --- Abschluss-/Fehler-Benachrichtigung senden ---
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    title: "{{ t.log_name }} {{ t.complete if trigger.id == 'Print Complete' else
                      t.failed }} – {{ states(printer_task_name_var) }}"
                    message: "{% set total_weight = states(printer_weight_var) | string |
                      replace(',', '.') | float(0) %} {% set progress =
                      states(printer_progress_var) | string | replace(',', '.')
                      | float(100) if trigger.id == 'Print failed' else 100.0 %}
                      {% set weight = total_weight * (progress / 100) %} {% set
                      fil_cost_per_kg = filament_cost_per_kg_var | string |
                      replace(',', '.') | float(0) %} {% set fil_cost = (weight
                      / 1000) * fil_cost_per_kg %}

                      {% set energy_cost = 0 %} {% set usage = 0 %} {% if
                      enable_energy_tracking_var and start_kwh_helper_var != ''
                      %}

                      \  {% set usage = (states(energy_sensor_var) | string |
                      replace(',', '.') | float(0) -
                      states(start_kwh_helper_var) | string | replace(',', '.')
                      | float(0)) %}

                      \  {% set dynamic_price =
                      states(electricity_price_sensor_var) %}

                      \  {% set elec_price = dynamic_price | string |
                      replace(',', '.') | float(static_electricity_price_var |
                      string | replace(',', '.') | float(0)) if dynamic_price
                      not in ['unknown', 'unavailable', ''] else
                      static_electricity_price_var | string | replace(',', '.')
                      | float(0) %}

                      \  {% set energy_cost = usage * elec_price %}

                      {% endif %}

                      {% if trigger.id == 'Print failed' %} ⚠️ {{ t.failed_at }}
                      {{ progress | round(0) }}% {% endif %} ⏱️ {{ t.duration }}: {{
                      ((states(printer_end_time_var) | as_timestamp(0) -
                      states(printer_start_time_var) | as_timestamp(0)) / 60) |
                      int(0) }} min

                      📊 {{ t.filament_usage }}: {{ weight | round(1) }} g {% if
                      enable_energy_tracking_var and start_kwh_helper_var != ''
                      %}{{ t.energy }}: {{ usage | round(2) }} kWh{% endif %}

                      {% if fil_cost > 0 or (enable_energy_tracking_var and
                      start_kwh_helper_var != '') %} 💰 {{ t.cost_breakdown }} {%
                      if fil_cost > 0 %}{{ t.filament }}: {{ currency }}{{ \"%.2f\" |
                      format(fil_cost) }}{% endif %} {% if
                      enable_energy_tracking_var and start_kwh_helper_var != ''
                      %}{{ t.energy }}: {{ currency }}{{ \"%.2f\" | format(energy_cost) }}{% endif
                      %} {{ t.total_cost }}: {{ currency }}{{ \"%.2f\" | format(fil_cost +
                      energy_cost) }} {% endif %}\n"
                    data:
                      color: "{{ 'green' if trigger.id == 'Print Complete' else 'red' }}"
                      icon_url: "{% if printer_camera_var %}

                        \  /api/camera_proxy/{{ printer_camera_var }}

                        {% else %}

                        \  {{ state_attr(printer_cover_image_var,
                        'entity_picture') }}

                        {% endif %}"
                      actions: "{{

                        \  [

                        \    {\"action\": \"URI\", \"title\":
                        action_1_title_var, \"uri\": action_1_uri_var},

                        \    {\"action\": \"URI\", \"title\":
                        action_2_camera_title_var if printer_camera_var else
                        action_2_fallback_title_var, \"uri\": (\"entityId:\" ~
                        printer_camera_var) if printer_camera_var else
                        action_2_fallback_uri_var}

                        \  ]

                        \  + ([{\"action\": \"BAMBU_CUSTOM_\" ~
                        printer_status_var, \"title\":
                        button_3_custom_title_var}] if button_3_mode_var ==
                        'Custom Action' else [])

                        }}"

          # =====================================================================
          # NEU: Düsen-Betriebsstunden aktualisieren
          # =====================================================================
          - variables:
              print_duration_hours: >-
                {{ ((states(printer_end_time_var) | as_timestamp(0) -
                states(printer_start_time_var) | as_timestamp(0)) / 3600) |
                round(4) }}
              tool_module_active: >-
                {% if printer_tool_module_sensor_var != ''
                   and states(printer_tool_module_sensor_var) not in ['unknown', 'unavailable', '', 'none', 'None'] %}
                  true
                {% else %}
                  false
                {% endif %}
          # Düse 1 – Stunden addieren (nur wenn kein Werkzeugmodul aktiv war)
          - choose:
              - conditions: >-
                  {{ enable_nozzle_tracking_var
                     and nozzle_1_hours_helper_var != ''
                     and not tool_module_active }}
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ nozzle_1_hours_helper_var }}"
                    data:
                      value: >-
                        {{ (states(nozzle_1_hours_helper_var) | string |
                        replace(',', '.') | float(0)
                           + print_duration_hours) | round(4) }}
          # Düse 2 – Stunden addieren (nur wenn kein Werkzeugmodul aktiv war)
          - choose:
              - conditions: >-
                  {{ enable_nozzle_tracking_var
                     and nozzle_2_hours_helper_var != ''
                     and not tool_module_active }}
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ nozzle_2_hours_helper_var }}"
                    data:
                      value: >-
                        {{ (states(nozzle_2_hours_helper_var) | string |
                        replace(',', '.') | float(0)
                           + print_duration_hours) | round(4) }}

          # =====================================================================
          # NEU: Wartungserinnerung Düse 1 prüfen und senden
          # =====================================================================
          - variables:
              nozzle_1_current_h: >-
                {{ states(nozzle_1_hours_helper_var) | string | replace(',',
                '.') | float(0) if nozzle_1_hours_helper_var != '' else 0 }}
              nozzle_1_snoozed: >-
                {% if nozzle_1_snooze_helper_var != '' and
                states(nozzle_1_snooze_helper_var) not in ['unknown',
                'unavailable'] %}
                  {% if state_attr(nozzle_1_snooze_helper_var, 'timestamp') != None %}
                    {{ now().timestamp() < state_attr(nozzle_1_snooze_helper_var, 'timestamp') }}
                  {% else %}
                    false
                  {% endif %}
                {% else %}
                  false
                {% endif %}
              nozzle_1_needs_maintenance: >-
                {{ enable_nozzle_tracking_var and nozzle_1_hours_helper_var !=
                '' and nozzle_1_current_h >= (nozzle_1_maintenance_interval_var
                | float(200)) and not nozzle_1_snoozed }}
          - choose:
              - conditions: "{{ nozzle_1_needs_maintenance }}"
                sequence:
                  - repeat:
                      for_each: !input notify_device
                      sequence:
                        - variables:
                            notify_service: "{% set tracker = device_entities(repeat.item) |
                              select('search', '^device_tracker\\.') | first |
                              default('') %} {% if tracker %}

                              \  notify.mobile_app_{{ tracker.split('.')[1] }}

                              {% else %}

                              \  notify.mobile_app_{{ device_attr(repeat.item,
                              'name') | slugify | replace('-', '_') }}

                              {% endif %}"
                        - action: "{{ notify_service }}"
                          data:
                            title: "🔧 {{ t.nozzle_maint }} – {{ nozzle_1_label }}"
                            message: >-
                              {{ nozzle_1_label }}
                              {{ t.nozzle_msg | replace('[H]', nozzle_1_current_h | round(1) | string) | replace('[I]', nozzle_1_maintenance_interval_var | string) }}
                            data:
                              tag: bambu_nozzle_1_maintenance_{{ printer_status_var }}
                              sticky: true
                              persistent: true
                              notification_icon: mdi:wrench-alert
                              color: orange
                              actions:
                                - action: BAMBU_NOZZLE_1_DONE_{{ printer_status_var }}
                                  title: "✅ {{ t.maint_done }}"
                                - action: BAMBU_NOZZLE_1_SNOOZE_{{ printer_status_var }}
                                  title: "⏰ {{ t.remind_in }}"
                                  behavior: textInput
                                  textInputButtonTitle: "{{ t.hours_btn }}"
                                  textInputPlaceholder: "{{ t.eg }} 24"

          # =====================================================================
          # NEU: Wartungserinnerung Düse 2 prüfen und senden
          # =====================================================================
          - variables:
              nozzle_2_current_h: >-
                {{ states(nozzle_2_hours_helper_var) | string | replace(',',
                '.') | float(0) if nozzle_2_hours_helper_var != '' else 0 }}
              nozzle_2_snoozed: >-
                {% if nozzle_2_snooze_helper_var != '' and
                states(nozzle_2_snooze_helper_var) not in ['unknown',
                'unavailable'] %}
                  {% if state_attr(nozzle_2_snooze_helper_var, 'timestamp') != None %}
                    {{ now().timestamp() < state_attr(nozzle_2_snooze_helper_var, 'timestamp') }}
                  {% else %}
                    false
                  {% endif %}
                {% else %}
                  false
                {% endif %}
              nozzle_2_needs_maintenance: >-
                {{ enable_nozzle_tracking_var and nozzle_2_hours_helper_var !=
                '' and nozzle_2_current_h >= (nozzle_2_maintenance_interval_var
                | float(200)) and not nozzle_2_snoozed }}
          - choose:
              - conditions: "{{ nozzle_2_needs_maintenance }}"
                sequence:
                  - repeat:
                      for_each: !input notify_device
                      sequence:
                        - variables:
                            notify_service: "{% set tracker = device_entities(repeat.item) |
                              select('search', '^device_tracker\\.') | first |
                              default('') %} {% if tracker %}

                              \  notify.mobile_app_{{ tracker.split('.')[1] }}

                              {% else %}

                              \  notify.mobile_app_{{ device_attr(repeat.item,
                              'name') | slugify | replace('-', '_') }}

                              {% endif %}"
                        - action: "{{ notify_service }}"
                          data:
                            title: "🔧 {{ t.nozzle_maint }} – {{ nozzle_2_label }}"
                            message: >-
                              {{ nozzle_2_label }}
                              {{ t.nozzle_msg | replace('[H]', nozzle_2_current_h | round(1) | string) | replace('[I]', nozzle_2_maintenance_interval_var | string) }}
                            data:
                              tag: bambu_nozzle_2_maintenance_{{ printer_status_var }}
                              sticky: true
                              persistent: true
                              notification_icon: mdi:wrench-alert
                              color: orange
                              actions:
                                - action: BAMBU_NOZZLE_2_DONE_{{ printer_status_var }}
                                  title: "✅ {{ t.maint_done }}"
                                - action: BAMBU_NOZZLE_2_SNOOZE_{{ printer_status_var }}
                                  title: "⏰ {{ t.remind_in }}"
                                  behavior: textInput
                                  textInputButtonTitle: "{{ t.hours_btn }}"
                                  textInputPlaceholder: "{{ t.eg }} 24"

          # =====================================================================
          # NEU: Druck-Protokollierung (Logbuch + opt. HA-Benachrichtigung)
          # =====================================================================
          - choose:
              - conditions: "{{ enable_logging_var and log_helper_entity_var != '' }}"
                sequence:
                  - variables:
                      log_progress: >-
                        {{ states(printer_progress_var) | string | replace(',',
                        '.') | float(100) if trigger.id == 'Print failed' else
                        100.0 }}
                      log_total_weight: >-
                        {{ states(printer_weight_var) | string | replace(',',
                        '.') | float(0) }}
                      log_weight: >-
                        {{ log_total_weight * (log_progress / 100) }}
                      log_fil_cost_per_kg: >-
                        {{ filament_cost_per_kg_var | string | replace(',', '.')
                        | float(0) }}
                      log_fil_cost: >-
                        {{ (log_weight / 1000) * log_fil_cost_per_kg }}
                      log_usage_kwh: >-
                        {% if enable_energy_tracking_var and
                        start_kwh_helper_var != '' %}
                          {{ (states(energy_sensor_var) | string | replace(',', '.') | float(0) -
                             states(start_kwh_helper_var) | string | replace(',', '.') | float(0)) }}
                        {% else %}
                          0
                        {% endif %}
                      log_elec_price: >-
                        {% if enable_energy_tracking_var and
                        start_kwh_helper_var != '' %}
                          {% set dp = states(electricity_price_sensor_var) %}
                          {{ dp | string | replace(',', '.') | float(static_electricity_price_var | string | replace(',', '.') | float(0))
                             if dp not in ['unknown', 'unavailable', ''] else
                             static_electricity_price_var | string | replace(',', '.') | float(0) }}
                        {% else %}
                          0
                        {% endif %}
                      log_energy_cost: >-
                        {{ log_usage_kwh * log_elec_price }}
                      log_duration_min: >-
                        {{ ((states(printer_end_time_var) | as_timestamp(0) -
                        states(printer_start_time_var) | as_timestamp(0)) / 60)
                        | int(0) }}
                      log_filaments: >-
                        {% if filament_log_helper_var != '' and
                           states(filament_log_helper_var) not in ['unknown', 'unavailable', ''] %}
                          {{ states(filament_log_helper_var) }}
                        {% else %}
                          –
                        {% endif %}
                      log_message: >-
                        {{ '✅' if trigger.id == 'Print Complete' else '❌' }} {{
                        states(printer_task_name_var) }} | {{ t.date_lbl }}: {{
                        now().strftime(t.date_fmt) }} | {{ t.duration }}: {{
                        (log_duration_min // 60) }}h {{ (log_duration_min % 60)
                        }}m | {{ t.progress_lbl }}: {{ log_progress | round(0) | int }}%
                        | Filament: {{ log_weight | round(1) }}g {% if
                        log_filaments != '–' %}| {{ t.materials }}: {{ log_filaments
                        }}{% endif %} {% if printer_nozzle_size_sensor_var != ''
                        and states(printer_nozzle_size_sensor_var) not in
                        ['unknown','unavailable',''] %}| {{ t.nozzle_size }}: {{
                        states(printer_nozzle_size_sensor_var) }}{% endif %} {%
                        if printer_bed_temp_sensor_var != '' and
                        states(printer_bed_temp_sensor_var) not in
                        ['unknown','unavailable',''] %}| Ø {{ t.bed_temp }}: {{
                        states(printer_bed_temp_sensor_var) }}°C{% endif %} {%
                        if printer_nozzle_1_temp_sensor_var != '' and
                        states(printer_nozzle_1_temp_sensor_var) not in
                        ['unknown','unavailable',''] %}| Ø {{ nozzle_1_label }}: {{
                        states(printer_nozzle_1_temp_sensor_var) }}°C{% endif %}
                        {% if printer_nozzle_2_temp_sensor_var != '' and
                        states(printer_nozzle_2_temp_sensor_var) not in
                        ['unknown','unavailable',''] %}| Ø {{ nozzle_2_label }}: {{
                        states(printer_nozzle_2_temp_sensor_var) }}°C{% endif %}
                        {% if printer_bed_type_sensor_var != '' and
                        states(printer_bed_type_sensor_var) not in
                        ['unknown','unavailable',''] %}| {{ t.print_bed }}: {{
                        states(printer_bed_type_sensor_var) }}{% endif %} {% if
                        printer_tool_module_sensor_var != '' and
                        states(printer_tool_module_sensor_var) not in
                        ['unknown','unavailable','none','None',''] %}|
                        {{ t.tool_module }}: {{ states(printer_tool_module_sensor_var)
                        }}{% endif %} | {{ t.filament_cost }}: {{ currency }}{{ "%.2f" |
                        format(log_fil_cost) }} {% if enable_energy_tracking_var
                        and start_kwh_helper_var != '' %}| {{ t.energy }}: {{
                        log_usage_kwh | round(2) }} kWh ({{ currency }}{{ "%.2f" |
                        format(log_energy_cost) }}){% endif %} | {{ t.total }}: {{ currency }}{{
                        "%.2f" | format(log_fil_cost + log_energy_cost) }}
                  # Logbuch-Eintrag
                  - action: logbook.log
                    data:
                      name: "{{ t.log_name }} – {{ states(printer_task_name_var) }}"
                      message: "{{ log_message }}"
                      entity_id: "{{ log_helper_entity_var }}" # ← Apostroph am Ende fehlt!
                  - action: input_text.set_value
                    target:
                      entity_id: "{{ log_helper_entity_var }}"
                    data:
                      value: "{{ log_message[:255] }}"
                  # Optional: Persistente HA-Benachrichtigung

                  - choose:
                      - conditions: "{{ log_ha_notification_var }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: "📋 {{ t.print_log }} – {{ states(printer_task_name_var) }}"
                              message: "{{ log_message }}"
                              notification_id: "bambu_log_{{ states(printer_task_name_var) | slugify }}_{{
                                now().timestamp() | int }}"
