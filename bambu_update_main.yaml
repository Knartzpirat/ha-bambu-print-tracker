blueprint:
  name: Bambu Lab Print Status & Energy Tracker
  description: 'Überwacht einen Bambu Lab 3D-Druck und sendet interaktive mobile Benachrichtigungen
    an mehrere Geräte für Fortschritt, Abschluss und Fehler. Enthält optionale
    Energieüberwachung, Kostenberechnung, Live-Kamera-Schnappschüsse, Ruhezeiten,
    benutzerdefinierte Aktionsbuttons (inkl. smartem Snooze/Stummschalten),
    Druck-Protokollierung sowie Düsen-Wartungsverfolgung für den Bambu H2D.

    '
  domain: automation
  input:
    printer_sensors_section:
      name: Drucker-Sensoren
      icon: mdi:printer-3d
      input:
        printer_status:
          name: Druckstatus-Sensor
          description: Sensor zur Verfolgung des aktuellen Druckstatus.
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false
        printer_progress:
          name: Druck-Fortschritts-Sensor
          description: Sensor zur Anzeige des Fortschritts in Prozent.
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false
        printer_task_name:
          name: Aufgabenname-Sensor
          description: Sensor mit dem Namen des Druckjobs.
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false
        printer_start_time:
          name: Startzeit-Sensor
          description: Sensor, der den Startzeitpunkt verfolgt.
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false
        printer_end_time:
          name: Endzeit-Sensor
          description: Sensor, der das Druckende verfolgt.
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false
        printer_remaining_time:
          name: Verbleibende Zeit (Optional)
          description: Sensor für die verbleibende Druckzeit (meist in Minuten).
          default: ''
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false
        printer_weight:
          name: Druckobjektgewicht-Sensor
          description: Sensor für das Gesamtgewicht des Drucks in Gramm.
          selector:
            entity:
              domain:
              - sensor
              device_class:
              - weight
              reorder: false
              multiple: false
        printer_cover_image:
          name: Vorschaubild Entity
          description: Bild-Entity für die Druckvorschau (Fallback ohne Kamera).
          selector:
            entity:
              domain:
              - image
              reorder: false
              multiple: false
        printer_camera:
          name: Drucker-Kamera (Optional)
          description: Live-Kamera für Schnappschüsse in Benachrichtigungen.
          default: ''
          selector:
            entity:
              domain:
              - camera
              reorder: false
              multiple: false
    notification_settings_section:
      name: Benachrichtigungseinstellungen
      icon: mdi:bell-ring
      collapsed: true
      input:
        notify_device:
          name: Benachrichtigungsgeräte (Mobile App)
          description: Wähle ein oder mehrere mobile Geräte aus.
          selector:
            device:
              integration: mobile_app
              multiple: true
        progress_interval:
          name: Nachrichten Fortschrittsintervall (%)
          description: Wie oft soll benachrichtigt werden (z. B. alle 5% oder 10%).
          default: 5
          selector:
            number:
              min: 1.0
              max: 50.0
              step: 1.0
              unit_of_measurement: '%'
              mode: slider
        enable_quiet_time:
          name: Ruhezeiten aktivieren
          description: Unterdrückt Fortschrittsmeldungen während dieser Zeiten.
            (Die Meldung „Druck abgeschlossen/fehlgeschlagen" wird trotzdem gesendet).
          default: false
          selector:
            boolean: {}
        quiet_time_start:
          name: Beginn der Ruhezeit
          description: Es ist an der Zeit, die Fortschrittsmeldungen stummzuschalten.
          default: '22:00:00'
          selector:
            time: {}
        quiet_time_end:
          name: Ende der Ruhezeit
          description: Es ist an der Zeit, die Unterdrückung von Fortschrittsmeldungen zu beenden.
          default: 07:00:00
          selector:
            time: {}
    action_buttons_section:
      name: Benachrichtigungs Aktionsbuttons
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        action_1_title:
          name: Titel Aktion 1
          description: Text für den ersten Benachrichtigungsbutton.
          default: Bambu App öffnen
          selector:
            select:
              options:
              - Bambu App öffnen
              - Home Assistant öffnen
              - Drucker-Dashboard öffnen
              custom_value: true
              multiple: false
              sort: false
        action_1_uri:
          name: URI Aktion 1
          description: Die URI/URL, die geöffnet werden soll, wenn auf „Aktion 1" getippt wird. Sie können eine Voreinstellung auswählen oder einen benutzerdefinierten Pfad eingeben.
          default: app://bbl.intl.bambulab.com
          selector:
            select:
              options:
              - label: Bambu Handy App
                value: app://bbl.intl.bambulab.com
              - label: Home Assistant Standard-Dashboard
                value: /
              custom_value: true
              multiple: false
              sort: false
        action_2_camera_title:
          name: Titel Aktion 2 (mit Kamera)
          description: Der Text für die zweite Schaltfläche, wenn eine Kamera ausgewählt ist.
          default: Kamera anzeigen
          selector:
            select:
              options:
              - Kamera anzeigen
              - Bambu App öffnen
              - Home Assistant öffnen
              custom_value: true
              multiple: false
              sort: false
        action_2_fallback_title:
          name: Titel Aktion 2 (ohne Kamera)
          description: Der Text für die zweite Schaltfläche, wenn KEINE Kamera ausgewählt ist.
          default: Home Assistant öffnen
          selector:
            select:
              options:
              - Home Assistant öffnen
              - Drucker-Dashboard öffnen
              custom_value: true
              multiple: false
              sort: false
        action_2_fallback_uri:
          name: URI Aktion 2 (ohne Kamera)
          description: Die URI, die geöffnet werden soll, wenn KEINE Kamera ausgewählt ist. Sie können eine
            Voreinstellung auswählen oder einen benutzerdefinierten Pfad eingeben.
          default: /
          selector:
            select:
              options:
              - label: Home Assistant Standard-Dashboard
                value: /
              - label: Bambu Handy App
                value: app://bbl.intl.bambulab.com
              custom_value: true
              multiple: false
              sort: false
        button_3_mode:
          name: Button 3 Mode
          description: Wähle aus, welche Funktion die dritte Schaltfläche haben soll. Mit „Fortschritt stummschalten" kannst
            du die Schlummerzeit direkt auf deinem Smartphone eingeben.
          default: Disabled
          selector:
            select:
              options:
              - Disabled
              - Mute Progress
              - Custom Action
              multiple: false
              custom_value: false
              sort: false
        snooze_datetime_helper:
          name: Snooze-Helfer (Optional)
          description: Wählen Sie einen „input_datetime"-Helper aus (konfiguriert für Datum
            und Uhrzeit). Falls angegeben, ist das Zurückstellen zu 100 % sicher und blockiert lediglich die Fortschrittsmeldungen.
            Wird das Feld leer gelassen, wird stattdessen diese
            Automatisierung vorübergehend deaktiviert.
          default: ''
          selector:
            entity:
              domain:
              - input_datetime
              reorder: false
              multiple: false
        button_3_custom_title:
          name: Titel benutzerdefinierte Aktion
          description: Der Text für die dritte Schaltfläche, wenn oben
            „Benutzerdefinierte Aktion" ausgewählt wurde.
          default: Benutzerdefinierte Aktion ausführen
          selector:
            text:
              multiline: false
              multiple: false
        button_3_custom_action:
          name: Benutzerdefinierte Aktion
          description: Die Sequenz, die ausgeführt wird, wenn die benutzerdefinierte Schaltfläche gedrückt wird. Lass
            deiner Fantasie freien Lauf – du kannst Skripte ausführen, Entitäten umschalten usw.
          default: []
          selector:
            action: {}
    filament_tracking_section:
      name: Filament-Tracking
      icon: mdi:printer-3d-nozzle
      collapsed: true
      input:
        filament_cost_per_kg:
          name: Filamentkosten pro kg (€)
          description: Geben Sie die Kosten Ihres Filaments pro Kilogramm ein (z. B. 18.99).
            Setzen Sie den Wert auf 0 um die Erfassung der Filamentkosten zu deaktivieren.
          default: 20.0
          selector:
            number:
              min: 0.0
              max: 100.0
              step: 0.01
              mode: box
    energy_tracking_section:
      name: Energy Tracking & Cost
      icon: mdi:lightning-bolt
      collapsed: true
      input:
        enable_energy_tracking:
          name: Energie-Tracking & Kosten
          description: Deaktivieren Sie diese Option, wenn an Ihrem
            Drucker kein Smart Plug angeschlossen ist. Ist diese Option deaktiviert, können Sie die folgenden Felder leer lassen.
          default: true
          selector:
            boolean: {}
        static_electricity_price:
          name: Einheitskosten für statische Elektrizität (€/kWh)
          description: Geben Sie hier Ihren festen Stromtarif ein. (z. B. 0.28 für 28 Cent
            pro kWh).
          default: 0.25
          selector:
            number:
              min: 0.0
              max: 2.0
              step: 0.01
              mode: box
        electricity_price_sensor:
          name: Dynamischer Strompreissensor
          description: (Optional) Wählen Sie einen Sensor aus, der die dynamischen Strompreise erfasst.
            Falls angegeben, werden die oben genannten statischen Kosten dadurch außer Kraft gesetzt.
          default: ''
          selector:
            entity:
              reorder: false
              multiple: false
        energy_sensor:
          name: Smart Plug mit Energiesensor (kWh)
          description: Gesamtverbrauchsanzeige für die am Drucker angeschlossene Smart-Steckdose.
          default: ''
          selector:
            entity:
              domain:
              - sensor
              device_class:
              - energy
              reorder: false
              multiple: false
        start_kwh_helper:
          name: Start kWh Helper
          description: Ein „input_number"-Helper zum Speichern der Anfangsenergie, wenn der
            Ausdruck beginnt.
          default: ''
          selector:
            entity:
              domain:
              - input_number
              reorder: false
              multiple: false

    # -----------------------------------------------------------------------
    # NEU: Druck-Protokollierung
    # -----------------------------------------------------------------------
    logging_section:
      name: Druck-Protokollierung
      icon: mdi:clipboard-text-clock
      collapsed: true
      input:
        enable_logging:
          name: Protokollierung aktivieren
          description: >-
            Speichert nach jedem abgeschlossenen oder fehlgeschlagenen Druck einen
            detaillierten Log-Eintrag im HA-Logbuch, verknüpft mit der unten angegebenen
            Helfer-Entität. Für Langzeitspeicherung den HA-Recorder auf eine längere
            Aufbewahrungszeit konfigurieren (recorder → purge_keep_days).
          default: false
          selector:
            boolean: {}
        log_ha_notification:
          name: Log als HA-Benachrichtigung anzeigen
          description: >-
            Zeigt den Log-Eintrag zusätzlich als persistente Benachrichtigung im
            Home Assistant Benachrichtigungscenter an. Bleibt so lange sichtbar,
            bis sie manuell geschlossen wird.
          default: false
          selector:
            boolean: {}
        log_helper_entity:
          name: Log-Helfer Entität
          description: >-
            Einen input_text Helper anlegen (Einstellungen → Helfer → Text,
            Max. Länge: 255). Alle Logbuch-Einträge werden mit dieser Entität
            verknüpft und der letzte Eintrag direkt als Wert gespeichert.
          default: ''
          selector:
            entity:
              domain:
              - input_text
              reorder: false
              multiple: false
        printer_nozzle_size_sensor:
          name: Düsengröße-Sensor (Optional)
          description: Sensor der die aktuelle Düsengröße anzeigt (z.B. „0.4 mm").
          default: ''
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false
        printer_filament_sensors:
          name: Aktive Filament-Slots (Optional, Mehrfachauswahl)
          description: >-
            Sensor „Aktiver Slot" der Bambu Lab Integration auswählen.
            Slots mit dem Wert „Empty" werden automatisch aus dem Log
            ausgelassen (z.B. wenn Werkzeuge verwendet werden).
          default: []
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: true
        printer_bed_temp_sensor:
          name: Druckbett-Temperatur Sensor (Optional)
          description: >-
            Sensor für die Druckbetttemperatur. Tipp: Für einen echten
            Durchschnittswert über den Druck einen HA-Statistics-Sensor auf
            Basis dieses Sensors mit mean_type=mean anlegen.
          default: ''
          selector:
            entity:
              domain:
              - sensor
              device_class:
              - temperature
              reorder: false
              multiple: false
        printer_nozzle_1_temp_sensor:
          name: Düse 1 – Temperatur-Sensor (Optional)
          description: Sensor für die Düse-1-Temperatur (Ø-Wert empfohlen, siehe Tipp oben).
          default: ''
          selector:
            entity:
              domain:
              - sensor
              device_class:
              - temperature
              reorder: false
              multiple: false
        printer_nozzle_2_temp_sensor:
          name: Düse 2 – Temperatur-Sensor (Optional, H2D)
          description: Sensor für die Düse-2-Temperatur des H2D.
          default: ''
          selector:
            entity:
              domain:
              - sensor
              device_class:
              - temperature
              reorder: false
              multiple: false
        printer_bed_type_sensor:
          name: Druckbett-Typ Sensor (Optional)
          description: Sensor der den aktuellen Druckbett-Typ bzw. die Oberfläche anzeigt.
          default: ''
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false
        printer_tool_module_sensor:
          name: Werkzeugmodul-Sensor (Optional)
          description: >-
            Sensor der anzeigt ob ein Werkzeugmodul angeschlossen ist und welches
            (z.B. Laser, Schneider). Ist kein Modul aktiv, wird dieses Feld
            im Log ausgelassen.
          default: ''
          selector:
            entity:
              domain:
              - sensor
              reorder: false
              multiple: false

    # -----------------------------------------------------------------------
    # NEU: Düsen-Wartung (H2D)
    # -----------------------------------------------------------------------
    nozzle_maintenance_section:
      name: Düsen-Wartung (H2D – Linke & Rechte Düse)
      icon: mdi:wrench-clock
      collapsed: true
      input:
        enable_nozzle_tracking:
          name: Düsen-Zeiterfassung aktivieren
          description: >-
            Zählt nach jedem Druck die Betriebsstunden beider Düsen und sendet
            eine Wartungserinnerung sobald das Intervall erreicht wird.
            Benötigt die input_number-Helper unten.
            Hinweis: Wenn der Tool Module State „laser" oder „cutter" ist,
            werden keine Stunden gezählt.
          default: false
          selector:
            boolean: {}
        nozzle_1_hours_helper:
          name: Düse 1 – Betriebsstunden Helper
          description: >-
            input_number Helper (min: 0, max: 10000, Schrittweite: 0.01, Einheit: h)
            für kumulierte Betriebsstunden der linken Düse.
            Entspricht sensor.{druckername}_nozzle_temperature_left.
          default: ''
          selector:
            entity:
              domain:
              - input_number
              reorder: false
              multiple: false
        nozzle_2_hours_helper:
          name: Düse 2 – Betriebsstunden Helper
          description: >-
            input_number Helper für die rechte Düse.
            Entspricht sensor.{druckername}_nozzle_temperature_right.
          default: ''
          selector:
            entity:
              domain:
              - input_number
              reorder: false
              multiple: false
        nozzle_1_maintenance_interval:
          name: Wartungsintervall Linke Düse (Stunden)
          description: >-
            Wartungserinnerung für die linke Düse nach X Betriebsstunden.
          default: 200
          selector:
            number:
              min: 10
              max: 5000
              step: 10
              unit_of_measurement: h
              mode: box
        nozzle_2_maintenance_interval:
          name: Wartungsintervall Rechte Düse (Stunden)
          description: Wartungsintervall für die rechte Düse in Betriebsstunden.
          default: 200
          selector:
            number:
              min: 10
              max: 5000
              step: 10
              unit_of_measurement: h
              mode: box
        nozzle_1_snooze_helper:
          name: Linke Düse – Wartungs-Snooze Helper (Optional)
          description: >-
            input_datetime Helper (Datum + Uhrzeit) zum Zurückstellen der
            Wartungserinnerung für die linke Düse.
          default: ''
          selector:
            entity:
              domain:
              - input_datetime
              reorder: false
              multiple: false
        nozzle_2_snooze_helper:
          name: Rechte Düse – Wartungs-Snooze Helper (Optional)
          description: input_datetime Helper für den Snooze der rechten Düse.
          default: ''
          selector:
            entity:
              domain:
              - input_datetime
              reorder: false
              multiple: false

  source_url: https://raw.githubusercontent.com/willhaggan/ha-bambu-print-tracker/main/bambu_update_main.yaml

# =========================================================================
# Variablen
# =========================================================================
variables:
  # --- Bestehende Variablen ---
  printer_status_var: !input printer_status
  printer_progress_var: !input printer_progress
  printer_task_name_var: !input printer_task_name
  printer_start_time_var: !input printer_start_time
  printer_end_time_var: !input printer_end_time
  printer_remaining_time_var: !input printer_remaining_time
  printer_weight_var: !input printer_weight
  printer_cover_image_var: !input printer_cover_image
  printer_camera_var: !input printer_camera
  enable_energy_tracking_var: !input enable_energy_tracking
  static_electricity_price_var: !input static_electricity_price
  electricity_price_sensor_var: !input electricity_price_sensor
  energy_sensor_var: !input energy_sensor
  start_kwh_helper_var: !input start_kwh_helper
  progress_interval_var: !input progress_interval
  filament_cost_per_kg_var: !input filament_cost_per_kg
  action_1_title_var: !input action_1_title
  action_1_uri_var: !input action_1_uri
  action_2_camera_title_var: !input action_2_camera_title
  action_2_fallback_title_var: !input action_2_fallback_title
  action_2_fallback_uri_var: !input action_2_fallback_uri
  button_3_mode_var: !input button_3_mode
  snooze_datetime_helper_var: !input snooze_datetime_helper
  button_3_custom_title_var: !input button_3_custom_title
  enable_quiet_time_var: !input enable_quiet_time
  quiet_time_start_var: !input quiet_time_start
  quiet_time_end_var: !input quiet_time_end
  # --- Neue Variablen: Protokollierung ---
  enable_logging_var: !input enable_logging
  log_ha_notification_var: !input log_ha_notification
  log_helper_entity_var: !input log_helper_entity
  printer_nozzle_size_sensor_var: !input printer_nozzle_size_sensor
  printer_filament_sensors_var: !input printer_filament_sensors
  printer_bed_temp_sensor_var: !input printer_bed_temp_sensor
  printer_nozzle_1_temp_sensor_var: !input printer_nozzle_1_temp_sensor
  printer_nozzle_2_temp_sensor_var: !input printer_nozzle_2_temp_sensor
  printer_bed_type_sensor_var: !input printer_bed_type_sensor
  printer_tool_module_sensor_var: !input printer_tool_module_sensor
  # --- Neue Variablen: Düsen-Wartung ---
  enable_nozzle_tracking_var: !input enable_nozzle_tracking
  nozzle_1_hours_helper_var: !input nozzle_1_hours_helper
  nozzle_2_hours_helper_var: !input nozzle_2_hours_helper
  nozzle_1_maintenance_interval_var: !input nozzle_1_maintenance_interval
  nozzle_2_maintenance_interval_var: !input nozzle_2_maintenance_interval
  nozzle_1_snooze_helper_var: !input nozzle_1_snooze_helper
  nozzle_2_snooze_helper_var: !input nozzle_2_snooze_helper

mode: parallel

# =========================================================================
# Trigger
# =========================================================================
trigger:
- trigger: state
  entity_id: !input printer_status
  to: running
  from: prepare
  id: Print Started
- trigger: state
  entity_id: !input printer_status
  to: finish
  from: running
  id: Print Complete
- trigger: state
  entity_id: !input printer_status
  to: failed
  id: Print failed
- trigger: state
  entity_id: !input printer_progress
  id: Progress
- trigger: event
  event_type: mobile_app_notification_action
  id: App_Action

# =========================================================================
# Aktionen
# =========================================================================
action:
- choose:

  # -----------------------------------------------------------------------
  # App-Aktion: Fortschritt stummschalten (Snooze)
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id: App_Action
    - condition: template
      value_template: '{{ trigger.event.data.action == ''BAMBU_MUTE_'' ~ printer_status_var
        }}'
    sequence:
    - variables:
        requested_snooze: "{% if trigger.event.data.reply_text is defined and trigger.event.data.reply_text
          | regex_match('^\\\\d+$') %}\n  {{ trigger.event.data.reply_text | int(60)
          }}\n{% else %}\n  60\n{% endif %}"
        remain_state: '{{ states(printer_remaining_time_var) if printer_remaining_time_var
          != '''' else ''unknown'' }}'
        safe_snooze: "{% if remain_state not in ['unknown', 'unavailable', ''] %}\n
          \ {% set max_snooze = (remain_state | int(0)) - 5 %}\n  {% set max_snooze
          = max_snooze if max_snooze > 0 else 1 %}\n  {{ [requested_snooze, max_snooze]
          | min }}\n{% else %}\n  {{ requested_snooze }}\n{% endif %}"
    - choose:
      - conditions: '{{ snooze_datetime_helper_var != '''' }}'
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: '{{ snooze_datetime_helper_var }}'
          data:
            timestamp: '{{ (now() + timedelta(minutes=requested_snooze)).timestamp()
              }}'
        - repeat:
            for_each: !input notify_device
            sequence:
            - variables:
                notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
                  '^device_tracker\\.') | first | default('') %} {% if tracker %}\n
                  \ notify.mobile_app_{{ tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{
                  device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}\n{%
                  endif %}"
            - action: '{{ notify_service }}'
              data:
                message: clear_notification
                data:
                  tag: '{{ states(printer_task_name_var) }}'
      - conditions: '{{ snooze_datetime_helper_var == '''' }}'
        sequence:
        - action: automation.turn_off
          data:
            stop_actions: false
          target:
            entity_id: '{{ this.entity_id }}'
        - repeat:
            for_each: !input notify_device
            sequence:
            - variables:
                notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
                  '^device_tracker\\.') | first | default('') %} {% if tracker %}\n
                  \ notify.mobile_app_{{ tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{
                  device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}\n{%
                  endif %}"
            - action: '{{ notify_service }}'
              data:
                message: clear_notification
                data:
                  tag: '{{ states(printer_task_name_var) }}'
        - delay:
            minutes: '{{ safe_snooze }}'
        - action: automation.turn_on
          data: {}
          target:
            entity_id: '{{ this.entity_id }}'

  # -----------------------------------------------------------------------
  # App-Aktion: Benutzerdefinierte Aktion
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id: App_Action
    - condition: template
      value_template: '{{ trigger.event.data.action == ''BAMBU_CUSTOM_'' ~ printer_status_var
        }}'
    sequence: !input button_3_custom_action

  # -----------------------------------------------------------------------
  # NEU – App-Aktion: Wartung Düse 1 erledigt → Zähler zurücksetzen
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id: App_Action
    - condition: template
      value_template: '{{ trigger.event.data.action == ''BAMBU_NOZZLE_1_DONE_'' ~ printer_status_var }}'
    sequence:
    - choose:
      - conditions: '{{ nozzle_1_hours_helper_var != '''' }}'
        sequence:
        - action: input_number.set_value
          target:
            entity_id: '{{ nozzle_1_hours_helper_var }}'
          data:
            value: '0'
    - choose:
      - conditions: '{{ nozzle_1_snooze_helper_var != '''' }}'
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: '{{ nozzle_1_snooze_helper_var }}'
          data:
            timestamp: '{{ now().timestamp() }}'
    - repeat:
        for_each: !input notify_device
        sequence:
        - variables:
            notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
              '^device_tracker\\.') | first | default('') %} {% if tracker %}\n  notify.mobile_app_{{
              tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{ device_attr(repeat.item,
              'name') | slugify | replace('-', '_') }}\n{% endif %}"
        - action: '{{ notify_service }}'
          data:
            message: clear_notification
            data:
              tag: bambu_nozzle_1_maintenance_{{ printer_status_var }}

  # -----------------------------------------------------------------------
  # NEU – App-Aktion: Wartung Düse 1 zurückstellen (Snooze in Stunden)
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id: App_Action
    - condition: template
      value_template: '{{ trigger.event.data.action == ''BAMBU_NOZZLE_1_SNOOZE_'' ~ printer_status_var }}'
    sequence:
    - variables:
        nozzle_snooze_hours: "{% if trigger.event.data.reply_text is defined and trigger.event.data.reply_text\
          \ | regex_match('^\\\\d+$') %}\n  {{ trigger.event.data.reply_text | int(24)\
          \ }}\n{% else %}\n  24\n{% endif %}"
    - choose:
      - conditions: '{{ nozzle_1_snooze_helper_var != '''' }}'
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: '{{ nozzle_1_snooze_helper_var }}'
          data:
            timestamp: '{{ (now() + timedelta(hours=nozzle_snooze_hours)).timestamp() }}'
    - repeat:
        for_each: !input notify_device
        sequence:
        - variables:
            notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
              '^device_tracker\\.') | first | default('') %} {% if tracker %}\n  notify.mobile_app_{{
              tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{ device_attr(repeat.item,
              'name') | slugify | replace('-', '_') }}\n{% endif %}"
        - action: '{{ notify_service }}'
          data:
            message: clear_notification
            data:
              tag: bambu_nozzle_1_maintenance_{{ printer_status_var }}

  # -----------------------------------------------------------------------
  # NEU – App-Aktion: Wartung Düse 2 erledigt → Zähler zurücksetzen
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id: App_Action
    - condition: template
      value_template: '{{ trigger.event.data.action == ''BAMBU_NOZZLE_2_DONE_'' ~ printer_status_var }}'
    sequence:
    - choose:
      - conditions: '{{ nozzle_2_hours_helper_var != '''' }}'
        sequence:
        - action: input_number.set_value
          target:
            entity_id: '{{ nozzle_2_hours_helper_var }}'
          data:
            value: '0'
    - choose:
      - conditions: '{{ nozzle_2_snooze_helper_var != '''' }}'
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: '{{ nozzle_2_snooze_helper_var }}'
          data:
            timestamp: '{{ now().timestamp() }}'
    - repeat:
        for_each: !input notify_device
        sequence:
        - variables:
            notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
              '^device_tracker\\.') | first | default('') %} {% if tracker %}\n  notify.mobile_app_{{
              tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{ device_attr(repeat.item,
              'name') | slugify | replace('-', '_') }}\n{% endif %}"
        - action: '{{ notify_service }}'
          data:
            message: clear_notification
            data:
              tag: bambu_nozzle_2_maintenance_{{ printer_status_var }}

  # -----------------------------------------------------------------------
  # NEU – App-Aktion: Wartung Düse 2 zurückstellen (Snooze in Stunden)
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id: App_Action
    - condition: template
      value_template: '{{ trigger.event.data.action == ''BAMBU_NOZZLE_2_SNOOZE_'' ~ printer_status_var }}'
    sequence:
    - variables:
        nozzle_snooze_hours: "{% if trigger.event.data.reply_text is defined and trigger.event.data.reply_text\
          \ | regex_match('^\\\\d+$') %}\n  {{ trigger.event.data.reply_text | int(24)\
          \ }}\n{% else %}\n  24\n{% endif %}"
    - choose:
      - conditions: '{{ nozzle_2_snooze_helper_var != '''' }}'
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: '{{ nozzle_2_snooze_helper_var }}'
          data:
            timestamp: '{{ (now() + timedelta(hours=nozzle_snooze_hours)).timestamp() }}'
    - repeat:
        for_each: !input notify_device
        sequence:
        - variables:
            notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
              '^device_tracker\\.') | first | default('') %} {% if tracker %}\n  notify.mobile_app_{{
              tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{ device_attr(repeat.item,
              'name') | slugify | replace('-', '_') }}\n{% endif %}"
        - action: '{{ notify_service }}'
          data:
            message: clear_notification
            data:
              tag: bambu_nozzle_2_maintenance_{{ printer_status_var }}

  # -----------------------------------------------------------------------
  # Druck gestartet
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id: Print Started
    sequence:
    - choose:
      - conditions: '{{ enable_energy_tracking_var and start_kwh_helper_var != ''''
          }}'
        sequence:
        - action: input_number.set_value
          target:
            entity_id: '{{ start_kwh_helper_var }}'
          data:
            value: '{{ states(energy_sensor_var) | string | replace('','', ''.'') | float(0) }}'

  # -----------------------------------------------------------------------
  # Fortschritts-Update
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id: Progress
    - condition: template
      value_template: "{% set old = trigger.from_state.state | default(-1) | float(-1)
        %} {% set new = trigger.to_state.state | default(-1) | float(-1) %} {% set
        interval = progress_interval_var | float(5) %}\n{% set quiet_enabled = enable_quiet_time_var
        %} {% set is_quiet = false %} {% if quiet_enabled %}\n  {% set q_start = today_at(quiet_time_start_var)
        %}\n  {% set q_end = today_at(quiet_time_end_var) %}\n  {% if q_start < q_end
        %}\n    {% set is_quiet = q_start <= now() <= q_end %}\n  {% else %}\n    {%
        set is_quiet = now() >= q_start or now() <= q_end %}\n  {% endif %}\n{% endif
        %}\n{% set is_snoozed = false %} {% set snooze_helper = snooze_datetime_helper_var
        %} {% if snooze_helper != '' and states(snooze_helper) not in ['unknown',
        'unavailable'] %}\n  {% if state_attr(snooze_helper, 'timestamp') != None
        %}\n    {% set is_snoozed = now().timestamp() < state_attr(snooze_helper,
        'timestamp') %}\n  {% endif %}\n{% endif %}\n{{ old >= 0 and new > old and
        new < 100 and (new // interval) > (old // interval) and not is_quiet and not
        is_snoozed }}\n"
    sequence:
    - repeat:
        for_each: !input notify_device
        sequence:
        - variables:
            notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
              '^device_tracker\\.') | first | default('') %} {% if tracker %}\n  notify.mobile_app_{{
              tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{ device_attr(repeat.item,
              'name') | slugify | replace('-', '_') }}\n{% endif %}"
        - action: '{{ notify_service }}'
          data:
            title: 3D-Druck Update | {{ states(printer_task_name_var) }}
            message: 'Druckfortschritt | {{ states(printer_progress_var) | int(0) }}
              % {% if printer_remaining_time_var %} {% set remain_state = states(printer_remaining_time_var)
              %} {% if remain_state not in [''unknown'', ''unavailable'', ''''] %}
              {% set remain_mins = remain_state | int(0) %} {% set h = remain_mins
              // 60 %} {% set m = remain_mins % 60 %} ⏳ Verbleibend: {% if h > 0 %}{{
              h }}h {% endif %}{{ m }}m {% endif %} {% endif %}

              '
            data:
              progress: '{{ states(printer_progress_var) | int(0) }}'
              progress_max: 100
              live_update: true
              critical_text: '{{ states(printer_progress_var) | int(0) }} %'
              alert_once: true
              chronometer: true
              sticky: true
              persistent: true
              tag: '{{ states(printer_task_name_var) }}'
              notification_icon: mdi:progress-alert
              icon_url: "{% if printer_camera_var %}\n  /api/camera_proxy/{{ printer_camera_var
                }}\n{% else %}\n  {{ state_attr(printer_cover_image_var, 'entity_picture')
                }}\n{% endif %}"
              actions: "{{\n  [\n    {\"action\": \"URI\", \"title\": action_1_title_var,
                \"uri\": action_1_uri_var},\n    {\"action\": \"URI\", \"title\":
                action_2_camera_title_var if printer_camera_var else action_2_fallback_title_var,
                \"uri\": (\"entityId:\" ~ printer_camera_var) if printer_camera_var
                else action_2_fallback_uri_var}\n  ]\n  + ([{\n       \"action\":
                \"BAMBU_MUTE_\" ~ printer_status_var, \n       \"title\": \"\U0001F507
                Schlummern\", \n       \"behavior\": \"textInput\",\n       \"textInputButtonTitle\":
                \"Stummschalten\",\n       \"textInputPlaceholder\": \"Min...\"\n     }] if
                button_3_mode_var == 'Mute Progress' else [])\n  + ([{\"action\":
                \"BAMBU_CUSTOM_\" ~ printer_status_var, \"title\": button_3_custom_title_var}]
                if button_3_mode_var == 'Custom Action' else [])\n}}"

  # -----------------------------------------------------------------------
  # Druck abgeschlossen / fehlgeschlagen
  # -----------------------------------------------------------------------
  - conditions:
    - condition: trigger
      id:
      - Print Complete
      - Print failed
    sequence:
    # --- Snooze-Helfer zurücksetzen ---
    - choose:
      - conditions: '{{ snooze_datetime_helper_var != '''' }}'
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: '{{ snooze_datetime_helper_var }}'
          data:
            timestamp: '{{ now().timestamp() }}'
    # --- Fortschritts-Benachrichtigung löschen ---
    - repeat:
        for_each: !input notify_device
        sequence:
        - variables:
            notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
              '^device_tracker\\.') | first | default('') %} {% if tracker %}\n  notify.mobile_app_{{
              tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{ device_attr(repeat.item,
              'name') | slugify | replace('-', '_') }}\n{% endif %}"
        - action: '{{ notify_service }}'
          data:
            message: clear_notification
            data:
              tag: '{{ states(printer_task_name_var) }}'
    # --- Abschluss-/Fehler-Benachrichtigung senden ---
    - repeat:
        for_each: !input notify_device
        sequence:
        - variables:
            notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
              '^device_tracker\\.') | first | default('') %} {% if tracker %}\n  notify.mobile_app_{{
              tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{ device_attr(repeat.item,
              'name') | slugify | replace('-', '_') }}\n{% endif %}"
        - action: '{{ notify_service }}'
          data:
            title: 3D-Druck {{ 'Abgeschlossen' if trigger.id == 'Print Complete' else 'Fehlgeschlagen'
              }} - {{ states(printer_task_name_var) }}
            message: "{% set total_weight = states(printer_weight_var) | string | replace(',',
              '.') | float(0) %} {% set progress = states(printer_progress_var) | string
              | replace(',', '.') | float(100) if trigger.id == 'Print failed' else
              100.0 %} {% set weight = total_weight * (progress / 100) %} {% set fil_cost_per_kg
              = filament_cost_per_kg_var | string | replace(',', '.') | float(0) %}
              {% set fil_cost = (weight / 1000) * fil_cost_per_kg %}\n{% set energy_cost
              = 0 %} {% set usage = 0 %} {% if enable_energy_tracking_var and start_kwh_helper_var
              != '' %}\n  {% set usage = (states(energy_sensor_var) | string | replace(',',
              '.') | float(0) - states(start_kwh_helper_var) | string | replace(',',
              '.') | float(0)) %}\n  {% set dynamic_price = states(electricity_price_sensor_var)
              %}\n  {% set elec_price = dynamic_price | string | replace(',', '.') | float(static_electricity_price_var
              | string | replace(',', '.') | float(0)) if dynamic_price not in ['unknown',
              'unavailable', ''] else static_electricity_price_var | string | replace(',',
              '.') | float(0) %}\n  {% set energy_cost = usage * elec_price %}\n{%
              endif %}\n{% if trigger.id == 'Print failed' %} ⚠️ Fehlgeschlagen bei
              {{ progress | round(0) }}% {% endif %} ⏱️ Dauer: {{ ((states(printer_end_time_var)
              | as_timestamp(0) - states(printer_start_time_var) | as_timestamp(0))
              / 60) | int(0) }} min\n\U0001F4CA Verbrauch Filament: {{ weight | round(1)
              }} g {% if enable_energy_tracking_var and start_kwh_helper_var != ''
              %}Energie: {{ usage | round(2) }} kWh{% endif %}\n{% if fil_cost > 0
              or (enable_energy_tracking_var and start_kwh_helper_var != '') %} \U0001F4B0
              Kostenaufschlüsselung {% if fil_cost > 0 %}Filament: €{{ \"%.2f\" | format(fil_cost)
              }}{% endif %} {% if enable_energy_tracking_var and start_kwh_helper_var
              != '' %}Energie: €{{ \"%.2f\" | format(energy_cost) }}{% endif %} Gesamtkosten:
              €{{ \"%.2f\" | format(fil_cost + energy_cost) }} {% endif %}\n"
            data:
              color: '{{ ''green'' if trigger.id == ''Print Complete'' else ''red''
                }}'
              icon_url: "{% if printer_camera_var %}\n  /api/camera_proxy/{{ printer_camera_var
                }}\n{% else %}\n  {{ state_attr(printer_cover_image_var, 'entity_picture')
                }}\n{% endif %}"
              actions: "{{\n  [\n    {\"action\": \"URI\", \"title\": action_1_title_var,
                \"uri\": action_1_uri_var},\n    {\"action\": \"URI\", \"title\":
                action_2_camera_title_var if printer_camera_var else action_2_fallback_title_var,
                \"uri\": (\"entityId:\" ~ printer_camera_var) if printer_camera_var
                else action_2_fallback_uri_var}\n  ]\n  + ([{\"action\": \"BAMBU_CUSTOM_\"
                ~ printer_status_var, \"title\": button_3_custom_title_var}] if button_3_mode_var
                == 'Custom Action' else [])\n}}"

    # =====================================================================
    # NEU: Düsen-Betriebsstunden aktualisieren
    # =====================================================================
    - variables:
        print_duration_hours: >-
          {{ ((states(printer_end_time_var) | as_timestamp(0) - states(printer_start_time_var)
          | as_timestamp(0)) / 3600) | round(4) }}
        tool_module_active: >-
          {% if printer_tool_module_sensor_var != ''
             and states(printer_tool_module_sensor_var) not in ['unknown', 'unavailable', '', 'none', 'None'] %}
            true
          {% else %}
            false
          {% endif %}
    # Linke Düse – Stunden addieren (nur wenn kein Werkzeugmodul aktiv war)
    - choose:
      - conditions: >-
          {{ enable_nozzle_tracking_var
             and nozzle_1_hours_helper_var != ''
             and not tool_module_active }}
        sequence:
        - action: input_number.set_value
          target:
            entity_id: '{{ nozzle_1_hours_helper_var }}'
          data:
            value: >-
              {{ (states(nozzle_1_hours_helper_var) | string | replace(',', '.') | float(0)
                 + print_duration_hours) | round(4) }}
    # Rechte Düse – Stunden addieren (nur wenn kein Werkzeugmodul aktiv war)
    - choose:
      - conditions: >-
          {{ enable_nozzle_tracking_var
             and nozzle_2_hours_helper_var != ''
             and not tool_module_active }}
        sequence:
        - action: input_number.set_value
          target:
            entity_id: '{{ nozzle_2_hours_helper_var }}'
          data:
            value: >-
              {{ (states(nozzle_2_hours_helper_var) | string | replace(',', '.') | float(0)
                 + print_duration_hours) | round(4) }}

    # =====================================================================
    # NEU: Wartungserinnerung Düse 1 prüfen und senden
    # =====================================================================
    - variables:
        nozzle_1_current_h: >-
          {{ states(nozzle_1_hours_helper_var) | string | replace(',', '.') | float(0)
          if nozzle_1_hours_helper_var != '' else 0 }}
        nozzle_1_snoozed: >-
          {% if nozzle_1_snooze_helper_var != '' and states(nozzle_1_snooze_helper_var)
          not in ['unknown', 'unavailable'] %}
            {% if state_attr(nozzle_1_snooze_helper_var, 'timestamp') != None %}
              {{ now().timestamp() < state_attr(nozzle_1_snooze_helper_var, 'timestamp') }}
            {% else %}
              false
            {% endif %}
          {% else %}
            false
          {% endif %}
        nozzle_1_needs_maintenance: >-
          {{ enable_nozzle_tracking_var
          and nozzle_1_hours_helper_var != ''
          and nozzle_1_current_h >= (nozzle_1_maintenance_interval_var | float(200))
          and not nozzle_1_snoozed }}
    - choose:
      - conditions: '{{ nozzle_1_needs_maintenance }}'
        sequence:
        - repeat:
            for_each: !input notify_device
            sequence:
            - variables:
                notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
                  '^device_tracker\\.') | first | default('') %} {% if tracker %}\n
                  \ notify.mobile_app_{{ tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{
                  device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}\n{%
                  endif %}"
            - action: '{{ notify_service }}'
              data:
                title: "\U0001F527 Düsen-Wartung fällig – Düse 1"
                message: >-
                  Düse 1 hat {{ nozzle_1_current_h | round(1) }}h erreicht
                  (Intervall: {{ nozzle_1_maintenance_interval_var }}h).
                  Bitte Düse reinigen oder tauschen.
                data:
                  tag: bambu_nozzle_1_maintenance_{{ printer_status_var }}
                  sticky: true
                  persistent: true
                  notification_icon: mdi:wrench-alert
                  color: orange
                  actions:
                  - action: BAMBU_NOZZLE_1_DONE_{{ printer_status_var }}
                    title: "\u2705 Wartung erledigt"
                  - action: BAMBU_NOZZLE_1_SNOOZE_{{ printer_status_var }}
                    title: "\u23F0 Erinnern in..."
                    behavior: textInput
                    textInputButtonTitle: Stunden
                    textInputPlaceholder: "z.B. 24"

    # =====================================================================
    # NEU: Wartungserinnerung Düse 2 prüfen und senden
    # =====================================================================
    - variables:
        nozzle_2_current_h: >-
          {{ states(nozzle_2_hours_helper_var) | string | replace(',', '.') | float(0)
          if nozzle_2_hours_helper_var != '' else 0 }}
        nozzle_2_snoozed: >-
          {% if nozzle_2_snooze_helper_var != '' and states(nozzle_2_snooze_helper_var)
          not in ['unknown', 'unavailable'] %}
            {% if state_attr(nozzle_2_snooze_helper_var, 'timestamp') != None %}
              {{ now().timestamp() < state_attr(nozzle_2_snooze_helper_var, 'timestamp') }}
            {% else %}
              false
            {% endif %}
          {% else %}
            false
          {% endif %}
        nozzle_2_needs_maintenance: >-
          {{ enable_nozzle_tracking_var
          and nozzle_2_hours_helper_var != ''
          and nozzle_2_current_h >= (nozzle_2_maintenance_interval_var | float(200))
          and not nozzle_2_snoozed }}
    - choose:
      - conditions: '{{ nozzle_2_needs_maintenance }}'
        sequence:
        - repeat:
            for_each: !input notify_device
            sequence:
            - variables:
                notify_service: "{% set tracker = device_entities(repeat.item) | select('search',
                  '^device_tracker\\.') | first | default('') %} {% if tracker %}\n
                  \ notify.mobile_app_{{ tracker.split('.')[1] }}\n{% else %}\n  notify.mobile_app_{{
                  device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}\n{%
                  endif %}"
            - action: '{{ notify_service }}'
              data:
                title: "\U0001F527 Düsen-Wartung fällig – Düse 2"
                message: >-
                  Düse 2 hat {{ nozzle_2_current_h | round(1) }}h erreicht
                  (Intervall: {{ nozzle_2_maintenance_interval_var }}h).
                  Bitte Düse reinigen oder tauschen.
                data:
                  tag: bambu_nozzle_2_maintenance_{{ printer_status_var }}
                  sticky: true
                  persistent: true
                  notification_icon: mdi:wrench-alert
                  color: orange
                  actions:
                  - action: BAMBU_NOZZLE_2_DONE_{{ printer_status_var }}
                    title: "\u2705 Wartung erledigt"
                  - action: BAMBU_NOZZLE_2_SNOOZE_{{ printer_status_var }}
                    title: "\u23F0 Erinnern in..."
                    behavior: textInput
                    textInputButtonTitle: Stunden
                    textInputPlaceholder: "z.B. 24"

    # =====================================================================
    # NEU: Druck-Protokollierung (Logbuch + opt. HA-Benachrichtigung)
    # =====================================================================
    - choose:
      - conditions: '{{ enable_logging_var and log_helper_entity_var != '''' }}'
        sequence:
        - variables:
            log_progress: >-
              {{ states(printer_progress_var) | string | replace(',', '.') | float(100)
              if trigger.id == 'Print failed' else 100.0 }}
            log_total_weight: >-
              {{ states(printer_weight_var) | string | replace(',', '.') | float(0) }}
            log_weight: >-
              {{ log_total_weight * (log_progress / 100) }}
            log_fil_cost_per_kg: >-
              {{ filament_cost_per_kg_var | string | replace(',', '.') | float(0) }}
            log_fil_cost: >-
              {{ (log_weight / 1000) * log_fil_cost_per_kg }}
            log_usage_kwh: >-
              {% if enable_energy_tracking_var and start_kwh_helper_var != '' %}
                {{ (states(energy_sensor_var) | string | replace(',', '.') | float(0) -
                   states(start_kwh_helper_var) | string | replace(',', '.') | float(0)) }}
              {% else %}
                0
              {% endif %}
            log_elec_price: >-
              {% if enable_energy_tracking_var and start_kwh_helper_var != '' %}
                {% set dp = states(electricity_price_sensor_var) %}
                {{ dp | string | replace(',', '.') | float(static_electricity_price_var | string | replace(',', '.') | float(0))
                   if dp not in ['unknown', 'unavailable', ''] else
                   static_electricity_price_var | string | replace(',', '.') | float(0) }}
              {% else %}
                0
              {% endif %}
            log_energy_cost: >-
              {{ log_usage_kwh * log_elec_price }}
            log_duration_min: >-
              {{ ((states(printer_end_time_var) | as_timestamp(0) - states(printer_start_time_var) | as_timestamp(0)) / 60) | int(0) }}
            log_filaments: >-
              {% if printer_filament_sensors_var | length > 0 %}
                {% set ns = namespace(list=[]) %}
                {% for s in printer_filament_sensors_var %}
                  {% if states(s) not in ['unknown', 'unavailable', '', 'Empty', 'empty'] %}
                    {% set ns.list = ns.list + [states(s)] %}
                  {% endif %}
                {% endfor %}
                {{ ns.list | join(', ') if ns.list | length > 0 else '–' }}
              {% else %}
                –
              {% endif %}
            log_message: >-
              {{ '✅' if trigger.id == 'Print Complete' else '❌' }} {{ states(printer_task_name_var) }}
              | Datum: {{ now().strftime('%d.%m.%Y %H:%M') }}
              | Dauer: {{ (log_duration_min // 60) }}h {{ (log_duration_min % 60) }}m
              | Fortschritt: {{ log_progress | round(0) | int }}%
              | Filament: {{ log_weight | round(1) }}g
              {% if log_filaments != '–' %}| Materialien: {{ log_filaments }}{% endif %}
              {% if printer_nozzle_size_sensor_var != '' and states(printer_nozzle_size_sensor_var) not in ['unknown','unavailable',''] %}| Düsengröße: {{ states(printer_nozzle_size_sensor_var) }}{% endif %}
              {% if printer_bed_temp_sensor_var != '' and states(printer_bed_temp_sensor_var) not in ['unknown','unavailable',''] %}| Ø Betttemp.: {{ states(printer_bed_temp_sensor_var) }}°C{% endif %}
              {% if printer_nozzle_1_temp_sensor_var != '' and states(printer_nozzle_1_temp_sensor_var) not in ['unknown','unavailable',''] %}| Ø Düse 1: {{ states(printer_nozzle_1_temp_sensor_var) }}°C{% endif %}
              {% if printer_nozzle_2_temp_sensor_var != '' and states(printer_nozzle_2_temp_sensor_var) not in ['unknown','unavailable',''] %}| Ø Düse 2: {{ states(printer_nozzle_2_temp_sensor_var) }}°C{% endif %}
              {% if printer_bed_type_sensor_var != '' and states(printer_bed_type_sensor_var) not in ['unknown','unavailable',''] %}| Druckbett: {{ states(printer_bed_type_sensor_var) }}{% endif %}
              {% if printer_tool_module_sensor_var != '' and states(printer_tool_module_sensor_var) not in ['unknown','unavailable','none','None',''] %}| Werkzeugmodul: {{ states(printer_tool_module_sensor_var) }}{% endif %}
              | Filamentkosten: €{{ "%.2f" | format(log_fil_cost) }}
              {% if enable_energy_tracking_var and start_kwh_helper_var != '' %}| Energie: {{ log_usage_kwh | round(2) }} kWh (€{{ "%.2f" | format(log_energy_cost) }}){% endif %}
              | Gesamt: €{{ "%.2f" | format(log_fil_cost + log_energy_cost) }}
        # Logbuch-Eintrag
        - action: logbook.log
          data:
            name: '3D Druck – {{ states(printer_task_name_var) }}'
            message: '{{ log_message }}'
            entity_id: '{{ log_helper_entity_var }}'  # ← Apostroph am Ende fehlt!
        - action: input_text.set_value
          target:
            entity_id: '{{ log_helper_entity_var }}'
          data:
            value: '{{ log_message[:255] }}'
        # Optional: Persistente HA-Benachrichtigung
        
        - choose:
          - conditions: '{{ log_ha_notification_var }}'
            sequence:
            - action: persistent_notification.create
              data:
                title: "\U0001F4CB Druckprotokoll – {{ states(printer_task_name_var) }}"
                message: "{{ log_message }}"
                notification_id: 'bambu_log_{{ states(printer_task_name_var) | slugify }}_{{ now().timestamp() | int }}'