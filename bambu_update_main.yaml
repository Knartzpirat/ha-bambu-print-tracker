mode: parallel

# =========================================================================
# Trigger
# =========================================================================
trigger:
  - trigger: state
    entity_id: !input printer_status
    to: running
    from: prepare
    id: Print Started
  - trigger: state
    entity_id: !input printer_status
    to: finish
    from: running
    id: Print Complete
  - trigger: state
    entity_id: !input printer_status
    to: failed
    id: Print failed
  - trigger: state
    entity_id: !input printer_progress
    id: Progress
  - trigger: event
    event_type: mobile_app_notification_action
    id: App_Action
  - trigger: template
    value_template: >-
      {{ printer_active_slot_sensor_var != '' and
         states(printer_status_var) == 'running' and
         states(printer_active_slot_sensor_var) not in ['unknown', 'unavailable', '', 'Empty', 'empty'] }}
    id: Filament_Change
  # --- Düse 1: Heizung gestartet (Zieltemp > Schwellwert, noch kein Startzeit gespeichert) ---
  - trigger: template
    value_template: >-
      {{ enable_nozzle_tracking_var and
         nozzle_1_target_temp_var != '' and
         nozzle_1_heating_start_var != '' and
         states(nozzle_1_target_temp_var) | float(0) > nozzle_temp_threshold_var | float(100) and
         states(nozzle_1_heating_start_var) | float(0) == 0 }}
    id: Nozzle_1_Heat_Start
  # --- Düse 1: Heizung gestoppt (Zieltemp ≤ Schwellwert, Startzeit vorhanden) ---
  - trigger: template
    value_template: >-
      {{ enable_nozzle_tracking_var and
         nozzle_1_target_temp_var != '' and
         nozzle_1_heating_start_var != '' and
         states(nozzle_1_target_temp_var) | float(0) <= nozzle_temp_threshold_var | float(100) and
         states(nozzle_1_heating_start_var) | float(0) > 0 }}
    id: Nozzle_1_Heat_Stop
  # --- Düse 2: Heizung gestartet ---
  - trigger: template
    value_template: >-
      {{ enable_nozzle_tracking_var and
         nozzle_2_target_temp_var != '' and
         nozzle_2_heating_start_var != '' and
         states(nozzle_2_target_temp_var) | float(0) > nozzle_temp_threshold_var | float(100) and
         states(nozzle_2_heating_start_var) | float(0) == 0 }}
    id: Nozzle_2_Heat_Start
  # --- Düse 2: Heizung gestoppt ---
  - trigger: template
    value_template: >-
      {{ enable_nozzle_tracking_var and
         nozzle_2_target_temp_var != '' and
         nozzle_2_heating_start_var != '' and
         states(nozzle_2_target_temp_var) | float(0) <= nozzle_temp_threshold_var | float(100) and
         states(nozzle_2_heating_start_var) | float(0) > 0 }}
    id: Nozzle_2_Heat_Stop
  # --- Düse 1: Reset-Schalter betätigt ---
  - trigger: state
    entity_id: !input nozzle_1_reset_button
    id: Nozzle_1_Reset
  # --- Düse 2: Reset-Schalter betätigt ---
  - trigger: state
    entity_id: !input nozzle_2_reset_button
    id: Nozzle_2_Reset

# =========================================================================
# Aktionen
# =========================================================================
action:
  - choose:

      # -----------------------------------------------------------------------
      # App-Aktion: Fortschritt stummschalten (Snooze)
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: App_Action
          - condition: template
            value_template: "{{ trigger.event.data.action == 'BAMBU_MUTE_' ~
              printer_status_var }}"
        sequence:
          - variables:
              requested_snooze: "{% if trigger.event.data.reply_text is defined and
                trigger.event.data.reply_text | regex_match('^\\\\d+$') %}

                \  {{ trigger.event.data.reply_text | int(60) }}

                {% else %}

                \  60

                {% endif %}"
              remain_state: "{{ states(printer_remaining_time_var) if
                printer_remaining_time_var != '' else 'unknown' }}"
              safe_snooze: "{% if remain_state not in ['unknown', 'unavailable', ''] %}

                \  {% set max_snooze = (remain_state | int(0)) - 5 %}

                \  {% set max_snooze = max_snooze if max_snooze > 0 else 1 %}

                \  {{ [requested_snooze, max_snooze] | min }}

                {% else %}

                \  {{ requested_snooze }}

                {% endif %}"
          - choose:
              - conditions: "{{ snooze_datetime_helper_var != '' }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ snooze_datetime_helper_var }}"
                    data:
                      timestamp: "{{ (now() + timedelta(minutes=requested_snooze)).timestamp() }}"
                  - repeat:
                      for_each: !input notify_device
                      sequence:
                        - variables:
                            notify_service: "{% set tracker = device_entities(repeat.item) |
                              select('search', '^device_tracker\\.') | first |
                              default('') %} {% if tracker %}

                              \  notify.mobile_app_{{ tracker.split('.')[1] }}

                              {% else %}

                              \  notify.mobile_app_{{ device_attr(repeat.item,
                              'name') | slugify | replace('-', '_') }}

                              {% endif %}"
                        - action: "{{ notify_service }}"
                          data:
                            message: clear_notification
                            data:
