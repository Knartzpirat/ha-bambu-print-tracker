                      tag: bambu_nozzle_1_reset_{{ printer_status_var }}
                      sticky: true
                      actions:
                        - action: BAMBU_NOZZLE_1_RESET_YES_{{ printer_status_var }}
                          title: "✅ {{ t.reset_yes }}"
                        - action: BAMBU_NOZZLE_1_RESET_NO_{{ printer_status_var }}
                          title: "❌ {{ t.reset_no }}"

      # -----------------------------------------------------------------------
      # Reset-Schalter Düse 2 → Sicherheitsabfrage senden
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Nozzle_2_Reset
        sequence:
          - repeat:
              for_each: !input notify_device
              sequence:
                - variables:
                    notify_service: "{% set tracker = device_entities(repeat.item) |
                      select('search', '^device_tracker\\.') | first |
                      default('') %} {% if tracker %}

                      \  notify.mobile_app_{{ tracker.split('.')[1] }}

                      {% else %}

                      \  notify.mobile_app_{{ device_attr(repeat.item, 'name') |
                      slugify | replace('-', '_') }}

                      {% endif %}"
                - action: "{{ notify_service }}"
                  data:
                    title: "⚠️ {{ printer_name_var }} – {{ t.reset_confirm }} – {{ nozzle_2_label }}"
                    message: >-
                      {{ t.reset_msg | replace('[N]', nozzle_2_label) | replace('[H]',
