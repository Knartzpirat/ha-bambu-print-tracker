
# ╔═══════════════════════════════════════════════════════════════════════╗
# ║          Bambu Lab Print Status & Energy Tracker          v0.1.5      ║
# ║          Home Assistant Blueprint – Automation                        ║
# ╠═══════════════════════════════════════════════════════════════════════╣
# ║                                                                       ║
# ║  Fork by Knartzpirat                                                  ║
# ║  https://github.com/Knartzpirat/ha-bambu-print-tracker                ║
# ║                                                                       ║
# ║  Based on the excellent original blueprint by                         ║
# ║  Will Haggan (@willhaggan) – thank you for the great foundation! 🙏  ║
# ║  https://github.com/willhaggan/ha-bambu-print-tracker                 ║
# ║                                                                       ║
# ║  Added features:                                                      ║
# ║    • Print logging (logbook + persistent HA notifications)            ║
# ║    • Live filament tracking via "Active Slot" sensor                  ║
# ║    • Nozzle maintenance tracking with reminders (H2D support)         ║
# ║    • Multi-language support (DE, EN, FR, ES) + configurable currency  ║
# ║                                                                       ║
# ╚═══════════════════════════════════════════════════════════════════════╝

blueprint:
  name: Bambu Lab Print Status & Energy Tracker
  description: >-
    Monitors a Bambu Lab 3D print and sends interactive mobile notifications
    for progress, completion, and failures. Includes energy tracking, cost
    calculation, print logging, live filament tracking, nozzle maintenance,
    and multi-language support (DE/EN/FR/ES).

    Überwacht einen Bambu Lab 3D-Druck und sendet interaktive mobile
    Benachrichtigungen für Fortschritt, Abschluss und Fehler. Enthält
    Energie-Tracking, Kostenberechnung, Druck-Protokollierung, Live-
    Filament-Tracking, Düsen-Wartung und Mehrsprachigkeit (DE/EN/FR/ES).
  domain: automation
  input:
    internationalization_section:
      name: "🌐 Sprache & Währung / Language & Currency"
      icon: mdi:translate
      input:
        language:
          name: Sprache / Language
          description: >-
            Sprache für Benachrichtigungen und Logs.

            Language for notifications and logs.
          default: de
          selector:
            select:
              options:
                - label: "🇩🇪 Deutsch"
                  value: de
                - label: "🇬🇧 English"
                  value: en
                - label: "🇫🇷 Français"
                  value: fr
                - label: "🇪🇸 Español"
                  value: es
              multiple: false
              custom_value: false
              sort: false
        currency_symbol:
          name: "Währungssymbol / Currency Symbol"
          description: >-
            Währungssymbol für Kostenangaben (z.B. €, $, £, CHF).

            Currency symbol for cost display.
          default: "€"
          selector:
            text:
              multiline: false
              multiple: false
    printer_sensors_section:
      name: "Drucker-Sensoren / Printer Sensors"
      icon: mdi:printer-3d
      input:
        printer_name:
          name: "Druckername / Printer Name"
          description: >-
            Frei wählbarer Name oder Entität des Druckers.
            Wird in allen Benachrichtigungen und Log-Einträgen angezeigt.
            Text = fester Name (z.B. "Bambu X1C").
            Entität = dynamischer Name aus einem Sensor/Input
            (z.B. input_text.printer_name).

            Custom name or entity for your printer.
            Shown in all notifications and log entries.
            Text = fixed name (e.g. "Bambu X1C").
            Entity = dynamic name from a sensor/input
            (e.g. input_text.printer_name).
          default: "Bambu Lab"
          selector:
            text:
              multiline: false
              multiple: false
        printer_status:
          name: "Druckstatus / Print Status"
          description: >-
            Sensor zur Verfolgung des aktuellen Druckstatus.

            Sensor tracking the current print status.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        printer_progress:
          name: "Druckfortschritt / Print Progress"
          description: >-
            Sensor zur Anzeige des Fortschritts in Prozent.

            Sensor showing print progress in percent.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        printer_task_name:
          name: "Aufgabenname / Task Name"
          description: >-
            Sensor mit dem Namen des aktuellen Druckjobs.

            Sensor containing the current print job name.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        printer_start_time:
          name: "Startzeit / Start Time"
          description: >-
            Sensor, der den Startzeitpunkt des Drucks verfolgt.

            Sensor tracking the print start time.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        printer_end_time:
          name: "Endzeit / End Time"
          description: >-
            Sensor, der das voraussichtliche Druckende verfolgt.

            Sensor tracking the estimated print end time.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        printer_remaining_time:
          name: "Verbleibende Zeit / Remaining Time (Optional)"
          description: >-
            Sensor für die verbleibende Druckzeit (meist in Minuten).

            Sensor showing remaining print time (usually in minutes).
          default: ""
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        printer_weight:
          name: "Druckgewicht / Print Weight"
          description: >-
            Sensor für das geschätzte Gesamtgewicht des Druckobjekts in Gramm.
            Wird für die Filamentkostenberechnung verwendet.

            Sensor for the estimated total weight of the print object in grams.
            Used for filament cost calculation.
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - weight
              multiple: false
        printer_cover_image:
          name: "Vorschaubild / Cover Image"
          description: >-
            Bild-Entity für die Druckvorschau (Fallback ohne Kamera).

            Image entity for the print preview (fallback without camera).
          selector:
            entity:
              domain:
                - image
              multiple: false
        printer_camera:
          name: "Drucker-Kamera / Printer Camera (Optional)"
          description: >-
            Live-Kamera für Schnappschüsse in Benachrichtigungen.

            Live camera for snapshots in notifications.
          default: ""
          selector:
            entity:
              domain:
                - camera
              multiple: false
    notification_settings_section:
      name: "Benachrichtigungen / Notifications"
      icon: mdi:bell-ring
      collapsed: true
      input:
        notify_device:
          name: "Benachrichtigungsgeräte / Notification Devices"
          description: >-
            Wähle ein oder mehrere mobile Geräte aus.

            Select one or more mobile devices.
          selector:
            device:
              integration: mobile_app
              multiple: true
        progress_interval:
          name: "Fortschrittsintervall / Progress Interval (%)"
          description: >-
            Wie oft soll benachrichtigt werden (z. B. alle 5 % oder 10 %).

            How often to send notifications (e.g. every 5% or 10%).
          default: 5
          selector:
            number:
              min: 1.0
              max: 50.0
              step: 1.0
              unit_of_measurement: "%"
              mode: slider
        enable_quiet_time:
          name: "Ruhezeiten / Quiet Hours"
          description: >-
            Unterdrückt Fortschrittsmeldungen während dieser Zeiten.
            Abschluss-/Fehlermeldungen werden trotzdem gesendet.

            Suppresses progress notifications during these hours.
            Completion/failure alerts are always sent.
          default: false
          selector:
            boolean: {}
        quiet_time_start:
          name: "Beginn Ruhezeit / Quiet Start"
          description: >-
            Ab diesem Zeitpunkt werden Fortschrittsmeldungen unterdrückt.

            Progress notifications are suppressed from this time.
          default: "22:00:00"
          selector:
            time: {}
        quiet_time_end:
          name: "Ende Ruhezeit / Quiet End"
          description: >-
            Ab diesem Zeitpunkt werden Fortschrittsmeldungen wieder gesendet.

            Progress notifications resume from this time.
          default: 07:00:00
          selector:
            time: {}
    action_buttons_section:
      name: "Aktionsbuttons / Action Buttons"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        action_1_title:
          name: "Aktion 1 Titel / Action 1 Title"
          description: >-
            Text für den ersten Benachrichtigungsbutton.

            Text for the first notification button.
          default: Open Bambu App
          selector:
            select:
              options:
                - Open Bambu App
                - Open Home Assistant
                - Open Printer Dashboard
              custom_value: true
              multiple: false
              sort: false
        action_1_uri:
          name: "URI Aktion 1 / Action 1 URI"
          description: >-
            URI/URL die bei Tippen auf Aktion 1 geöffnet wird.
            Voreinstellung wählen oder eigenen Pfad eingeben.

            URI/URL opened when Action 1 is tapped.
            Choose a preset or enter a custom path.
          default: app://bbl.intl.bambulab.com
          selector:
            select:
              options:
                - label: Bambu Handy App
                  value: app://bbl.intl.bambulab.com
                - label: Home Assistant Dashboard
                  value: /
              custom_value: true
              multiple: false
              sort: false
        action_2_camera_title:
          name: "Aktion 2 mit Kamera / Action 2 with Camera"
          description: >-
            Text für die zweite Schaltfläche, wenn eine Kamera ausgewählt ist.

            Text for the second button when a camera is selected.
          default: Show Camera
          selector:
            select:
              options:
                - Show Camera
                - Open Bambu App
                - Open Home Assistant
              custom_value: true
              multiple: false
              sort: false
        action_2_fallback_title:
          name: "Aktion 2 ohne Kamera / Action 2 without Camera"
          description: >-
            Text für die zweite Schaltfläche, wenn KEINE Kamera ausgewählt ist.

            Text for the second button when NO camera is selected.
          default: Open Home Assistant
          selector:
            select:
              options:
                - Open Home Assistant
                - Open Printer Dashboard
              custom_value: true
              multiple: false
              sort: false
        action_2_fallback_uri:
          name: "URI Aktion 2 ohne Kamera / Action 2 Fallback URI"
          description: >-
            URI die geöffnet wird, wenn KEINE Kamera ausgewählt ist.
            Voreinstellung wählen oder eigenen Pfad eingeben.

            URI opened when NO camera is selected.
            Choose a preset or enter a custom path.
          default: /
          selector:
            select:
              options:
                - label: Home Assistant Dashboard
                  value: /
                - label: Bambu Handy App
                  value: app://bbl.intl.bambulab.com
              custom_value: true
              multiple: false
              sort: false
        button_3_mode:
          name: "Dritte Schaltfläche / Third Button Mode"
          description: >-
            Funktion der dritten Schaltfläche.
            „Mute Progress" = Stummschalten per Texteingabe (Minuten).
            „Custom Action" = frei definierbare Aktion.

            Function of the third button.
            "Mute Progress" = mute via text input (minutes).
            "Custom Action" = run a custom action.
          default: Disabled
          selector:
            select:
              options:
                - Disabled
                - Mute Progress
                - Custom Action
              multiple: false
              custom_value: false
              sort: false
        snooze_datetime_helper:
          name: "Snooze-Helper (Optional)"
          description: >-
            input_datetime Helper (Datum + Uhrzeit). Ermöglicht das
            Stummschalten von Fortschrittsbenachrichtigungen für eine
            einstellbare Dauer. Die Automatisierung bleibt immer aktiv –
            alle Tracking-Funktionen laufen im Hintergrund weiter.
            Ohne Helper wird nur die aktuelle Benachrichtigung entfernt.

            input_datetime helper (date + time). Allows muting progress
            notifications for a configurable duration. The automation
            always stays active – all tracking continues in the background.
            Without helper, only the current notification is dismissed.
          default: ""
          selector:
            entity:
              domain:
                - input_datetime
              multiple: false
        button_3_custom_title:
          name: "Titel benutzerdefinierte Aktion / Custom Action Title"
          description: >-
            Text für die dritte Schaltfläche im Modus „Custom Action".
            Text for the third button in "Custom Action" mode.
          default: Custom Action
          selector:
            text:
              multiline: false
              multiple: false
        button_3_custom_action:
          name: "Benutzerdefinierte Aktion / Custom Action"
          description: >-
            Aktionssequenz die bei Druck auf die dritte Schaltfläche
            ausgeführt wird. Skripte, Entitäten umschalten usw.

            Action sequence executed when the third button is pressed.
            Run scripts, toggle entities, etc.
          default: []
          selector:
            action: {}
    filament_tracking_section:
      name: "Filament-Tracking"
      icon: mdi:printer-3d-nozzle
      collapsed: true
      input:
        filament_cost_per_kg:
          name: "Filamentkosten pro kg / Filament Cost per kg"
          description: >-
            Kosten pro Kilogramm Filament in der gewählten Währung.
            Wert 0 = Filamentkostenberechnung deaktiviert.

            Cost per kilogram of filament in your selected currency.
            Set to 0 to disable filament cost tracking.
          default: 20.0
          selector:
            number:
              min: 0.0
              max: 100.0
              step: 0.01
              mode: box
        filament_weight_unit:
          name: "Filamenteinheit / Filament Weight Unit"
          description: >-
            Einheit für die Anzeige des Filamentverbrauchs in
            Benachrichtigungen und Logs.

            Unit for displaying filament usage in notifications and logs.
          default: kg
          selector:
            select:
              options:
                - label: Kilogramm (kg)
                  value: kg
                - label: Gramm (g)
                  value: g
              multiple: false
              sort: false
    energy_tracking_section:
      name: "Energie-Tracking / Energy Tracking"
      icon: mdi:lightning-bolt
      collapsed: true
      input:
        enable_energy_tracking:
          name: "Energie-Tracking aktivieren / Enable Energy Tracking"
          description: >-
            Erfasst Stromverbrauch und Energiekosten pro Druck.
            Benötigt Smart Plug mit Energiesensor. Bei Deaktivierung
            können die folgenden Felder leer bleiben.

            Tracks electricity consumption and energy costs per print.
            Requires a smart plug with energy sensor. When disabled,
            the following fields can be left empty.
          default: true
          selector:
            boolean: {}
        static_electricity_price:
          name: "Fester Strompreis / Static Electricity Price (/kWh)"
          description: >-
            Fester Stromtarif pro kWh in der gewählten Währung (z. B. 0.28).
            Wird durch den dynamischen Strompreissensor überschrieben.

            Static electricity rate per kWh in your currency (e.g. 0.28).
            Overridden by the dynamic price sensor if configured.
          default: 0.25
          selector:
            number:
              min: 0.0
              max: 2.0
              step: 0.01
              mode: box
        electricity_price_sensor:
          name: "Dynamischer Strompreis / Dynamic Price Sensor (Optional)"
          description: >-
            Sensor für dynamische Strompreise (z. B. Tibber, aWATTar).
            Überschreibt den festen Strompreis.

            Sensor for dynamic electricity prices (e.g. Tibber, aWATTar).
            Overrides the static electricity price.
          default: ""
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - monetary
              multiple: false
        energy_sensor:
          name: "Energiesensor / Energy Sensor (kWh)"
          description: >-
            Sensor für den kumulierten Gesamtverbrauch (kWh) der am
            Drucker angeschlossenen Smart-Steckdose.

            Sensor for cumulative total consumption (kWh) of the
            smart plug connected to the printer.
          default: ""
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - energy
              multiple: false
        start_kwh_helper:
          name: "Start-kWh Helper"
          description: >-
            input_number Helper zum Speichern des Zählerstands bei Druckstart.
            Die Differenz zum Druckende ergibt den Verbrauch pro Druck.

            input_number helper to store the meter reading at print start.
            The difference to print end gives the consumption per print.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        total_energy_helper:
          name: "Gesamtenergie Helper / Total Energy Helper (Optional)"
          description: >-
            input_number Helper (min: 0, max: 999999, step: 0.01, unit: kWh).
            Kumulierter Gesamtenergieverbrauch über alle Drucke.
            Wird nach jedem Druck automatisch erhöht.

            input_number helper (min: 0, max: 999999, step: 0.01, unit: kWh).
            Cumulative total energy consumption across all prints.
            Automatically incremented after each print.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        total_cost_helper:
          name: "Gesamtkosten Helper / Total Cost Helper (Optional)"
          description: >-
            input_number Helper (min: 0, max: 999999, step: 0.01).
            Kumulierte Gesamtkosten (Filament + Energie) über alle Drucke.
            Wird nach jedem Druck automatisch erhöht.

            input_number helper (min: 0, max: 999999, step: 0.01).
            Cumulative total costs (filament + energy) across all prints.
            Automatically incremented after each print.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        total_energy_cost_helper:
          name: "Gesamt-Energiekosten Helper / Total Energy Cost Helper (Optional)"
          description: >-
            input_number Helper (min: 0, max: 999999, step: 0.01).
            Kumulierte Stromkosten über alle Drucke.

            input_number helper (min: 0, max: 999999, step: 0.01).
            Cumulative electricity costs across all prints.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        total_fil_usage_helper:
          name: "Gesamt-Filamentverbrauch Helper / Total Filament Usage Helper (Optional)"
          description: >-
            input_number Helper (min: 0, max: 999999, step: 0.01, unit: g).
            Kumulierter Filamentverbrauch in Gramm über alle Drucke.

            input_number helper (min: 0, max: 999999, step: 0.01, unit: g).
            Cumulative filament usage in grams across all prints.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        total_fil_cost_helper:
          name: "Gesamt-Filamentkosten Helper / Total Filament Cost Helper (Optional)"
          description: >-
            input_number Helper (min: 0, max: 999999, step: 0.01).
            Kumulierte Filamentkosten über alle Drucke.

            input_number helper (min: 0, max: 999999, step: 0.01).
            Cumulative filament costs across all prints.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false

    # -----------------------------------------------------------------------
    # Druck-Protokollierung / Print Logging
    # -----------------------------------------------------------------------
    logging_section:
      name: "Druck-Protokollierung / Print Logging"
      icon: mdi:clipboard-text-clock
      collapsed: true
      input:
        enable_logging:
          name: "Protokollierung / Enable Logging"
          description: >-
            Speichert nach jedem Druck einen detaillierten Log-Eintrag
            im HA-Logbuch. Für Langzeitspeicherung den Recorder auf
            längere Aufbewahrungszeit konfigurieren (purge_keep_days).

            Saves a detailed log entry in the HA logbook after each print.
            For long-term storage, configure the recorder retention
            period (purge_keep_days).
          default: false
          selector:
            boolean: {}
        log_ha_notification:
          name: "Persistente Benachrichtigung / Persistent Notification"
          description: >-
            Zeigt den Log-Eintrag als persistente Benachrichtigung im
            HA-Benachrichtigungscenter an. Bleibt sichtbar bis manuell
            geschlossen.

            Shows the log entry as a persistent notification in the HA
            notification center. Stays visible until manually dismissed.
          default: false
          selector:
            boolean: {}
        log_helper_entity:
          name: "Log-Helper Entity"
          description: >-
            input_text Helper (Max. Länge: 255). Logbuch-Einträge werden
            mit dieser Entität verknüpft, letzter Eintrag als Wert.

            input_text helper (max length: 255). Logbook entries are
            linked to this entity, last entry stored as value.
          default: ""
          selector:
            entity:
              domain:
                - input_text
              multiple: false
        printer_nozzle_size_sensor:
          name: "Düsengröße / Nozzle Size (Optional)"
          description: >-
            Sensor der die aktuelle Düsengröße anzeigt (z. B. „0.4 mm").

            Sensor showing the current nozzle size (e.g. "0.4 mm").
          default: ""
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        printer_active_slot_sensor:
          name: "Aktiver Slot / Active Slot (Optional)"
          description: >-
            Bambu Lab „Aktiver Slot"-Sensor. Wechselt während des Drucks
            zwischen Filamentname und „Empty". Alle Materialien werden
            automatisch gesammelt. Benötigt den Filament-Log-Helper.

            Bambu Lab "Active Slot" sensor. Alternates between the
            filament name and "Empty" during printing. All materials
            are collected automatically. Requires the filament log helper.
          default: ""
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        filament_log_helper:
          name: "Filament-Log Helper (Optional)"
          description: >-
            input_text Helper (Max. Länge: 255) zum Sammeln der
            verwendeten Filamente. Wird bei Druckstart geleert und
            bei jedem Filamentwechsel aktualisiert.

            input_text helper (max length: 255) to collect filaments
            used during a print. Cleared at print start and updated
            on each filament change.
          default: ""
          selector:
            entity:
              domain:
                - input_text
              multiple: false
        printer_bed_temp_sensor:
          name: "Betttemperatur / Bed Temperature (Optional)"
          description: >-
            Sensor für die Druckbetttemperatur. Tipp: HA-Statistics-
            Sensor mit mean_type=mean für echten Durchschnittswert.

            Sensor for the print bed temperature. Tip: create a HA
            statistics sensor with mean_type=mean for a true average.
          default: ""
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - temperature
              multiple: false
        printer_nozzle_1_temp_sensor:
          name: "Düse 1 Temperatur / Nozzle 1 Temperature (Optional)"
          description: >-
            Sensor für die Düse-1-Temperatur (Ø-Wert empfohlen).

            Sensor for nozzle 1 temperature (average recommended).
          default: ""
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - temperature
              multiple: false
        printer_nozzle_2_temp_sensor:
          name: "Düse 2 Temperatur / Nozzle 2 Temperature (Optional)"
          description: >-
            Sensor für die Düse-2-Temperatur.

            Sensor for nozzle 2 temperature.
          default: ""
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - temperature
              multiple: false
        printer_bed_type_sensor:
          name: "Druckbett-Typ / Bed Type (Optional)"
          description: >-
            Sensor der den aktuellen Druckbett-Typ anzeigt.

            Sensor showing the current print bed type/surface.
          default: ""
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        printer_tool_module_sensor:
          name: "Werkzeugmodul / Tool Module (Optional)"
          description: >-
            Sensor der anzeigt ob ein Werkzeugmodul angeschlossen ist
            (z. B. Laser, Schneider). Ohne aktives Modul wird dieses
            Feld im Log ausgelassen.

            Sensor showing whether a tool module is attached
            (e.g. laser, cutter). If no module is active, this field
            is omitted from the log.
          default: ""
          selector:
            entity:
              domain:
                - sensor
              multiple: false

    # -----------------------------------------------------------------------
    # Düsen-Wartung / Nozzle Maintenance
    # -----------------------------------------------------------------------
    nozzle_maintenance_section:
      name: "Düsen-Wartung / Nozzle Maintenance"
      icon: mdi:wrench-clock
      collapsed: true
      input:
        enable_nozzle_tracking:
          name: "Düsen-Tracking / Enable Nozzle Tracking"
          description: >-
            Zählt Betriebsstunden pro Düse basierend auf der
            Zieltemperatur. Sendet Wartungserinnerung bei Erreichen
            des Intervalls.

            Counts operating hours per nozzle based on target
            temperature. Sends maintenance reminder when interval
            is reached.
          default: false
          selector:
            boolean: {}
        nozzle_temp_threshold:
          name: "Temperatur-Schwellwert / Temp Threshold (°C)"
          description: >-
            Ab dieser Zieltemperatur wird die Düse als aktiv gewertet
            und Betriebsstunden werden gezählt.

            Target temperature above which the nozzle is considered
            active and operating hours are counted.
          default: 100
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: "°C"
              mode: box
        is_h2d_printer:
          name: "H2D Drucker / H2D Printer (Dual Nozzle)"
          description: >-
            Aktivieren für Bambu H2D. „Düse 1/2" wird in
            Benachrichtigungen durch „Linke/Rechte Düse" ersetzt.

            Enable for Bambu H2D. "Nozzle 1/2" is replaced by
            "Left/Right Nozzle" in notifications and logs.
          default: false
          selector:
            boolean: {}
        nozzle_1_type:
          name: "Düsentyp Düse 1 / Nozzle 1 Type"
          description: >-
            Typ der Düse 1 (z. B. Stahl gehärtet, Messing).
            Wird im Log protokolliert.

            Type of nozzle 1 (e.g. hardened steel, brass).
            Logged in the print log.
          default: "Stahl gehärtet / Hardened Steel"
          selector:
            select:
              options:
                - "Stahl gehärtet / Hardened Steel"
                - "Messing / Brass"
                - "Edelstahl / Stainless Steel"
                - "Kupfer / Copper"
              custom_value: true
              multiple: false
              sort: false
        nozzle_2_type:
          name: "Düsentyp Düse 2 / Nozzle 2 Type"
          description: >-
            Typ der Düse 2 (z. B. Stahl gehärtet, Messing).
            Wird im Log protokolliert.

            Type of nozzle 2 (e.g. hardened steel, brass).
            Logged in the print log.
          default: "Stahl gehärtet / Hardened Steel"
          selector:
            select:
              options:
                - "Stahl gehärtet / Hardened Steel"
                - "Messing / Brass"
                - "Edelstahl / Stainless Steel"
                - "Kupfer / Copper"
              custom_value: true
              multiple: false
              sort: false
        nozzle_1_target_temp_sensor:
          name: "Düse 1 Zieltemperatur / Nozzle 1 Target Temp"
          description: >-
            Sensor für die Zieltemperatur der Düse 1 (H2D: Linke Düse).
            Stunden werden gezählt solange Zieltemp. > Schwellwert.

            Sensor for nozzle 1 target temperature (H2D: Left Nozzle).
            Hours are counted while target temp > threshold.
          default: ""
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - temperature
              multiple: false
        nozzle_2_target_temp_sensor:
          name: "Düse 2 Zieltemperatur / Nozzle 2 Target Temp"
          description: >-
            Sensor für die Zieltemperatur der Düse 2 (H2D: Rechte Düse).

            Sensor for nozzle 2 target temperature (H2D: Right Nozzle).
          default: ""
          selector:
            entity:
              domain:
                - sensor
              device_class:
                - temperature
              multiple: false
        nozzle_1_heating_start_helper:
          name: "Düse 1 Heizstart / Nozzle 1 Heat Start Helper"
          description: >-
            input_number Helper (min: 0, max: 9999999999, step: 1).
            Speichert intern den Unix-Zeitstempel des Heizbeginns.
            Nicht manuell ändern.

            input_number helper (min: 0, max: 9999999999, step: 1).
            Internally stores the Unix timestamp of heating start.
            Do not change manually.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        nozzle_2_heating_start_helper:
          name: "Düse 2 Heizstart / Nozzle 2 Heat Start Helper"
          description: >-
            input_number Helper (min: 0, max: 9999999999, step: 1).
            Speichert den Unix-Zeitstempel des Heizbeginns der Düse 2.

            input_number helper (min: 0, max: 9999999999, step: 1).
            Stores the Unix timestamp of nozzle 2 heating start.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        nozzle_1_hours_helper:
          name: "Düse 1 Betriebsstunden / Nozzle 1 Hours Helper"
          description: >-
            input_number Helper (min: 0, max: 10000, step: 0.01, unit: h).
            Kumulierte Betriebsstunden der Düse 1 (H2D: Linke Düse).
            Wird automatisch erhöht solange die Zieltemperatur > Schwellwert.

            Cumulative operating hours for nozzle 1 (H2D: Left Nozzle).
            Automatically incremented while target temp > threshold.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        nozzle_2_hours_helper:
          name: "Düse 2 Betriebsstunden / Nozzle 2 Hours Helper"
          description: >-
            input_number Helper für kumulierte Betriebsstunden der
            Düse 2 (H2D: Rechte Düse). Wird automatisch erhöht
            solange die Zieltemperatur > Schwellwert.

            input_number helper for cumulative operating hours of
            nozzle 2 (H2D: Right Nozzle). Automatically incremented
            while target temp > threshold.
          default: ""
          selector:
            entity:
              domain:
                - input_number
              multiple: false
        nozzle_1_maintenance_interval:
          name: "Wartungsintervall Düse 1 / Nozzle 1 Interval (h)"
          description: >-
            Wartungserinnerung nach X Betriebsstunden.

            Maintenance reminder after X operating hours.
          default: 200
          selector:
            number:
              min: 10
              max: 5000
              step: 10
              unit_of_measurement: h
              mode: box
        nozzle_2_maintenance_interval:
          name: "Wartungsintervall Düse 2 / Nozzle 2 Interval (h)"
          description: >-
            Wartungsintervall für Düse 2 in Betriebsstunden.

            Maintenance interval for nozzle 2 in operating hours.
          default: 200
          selector:
            number:
              min: 10
              max: 5000
              step: 10
              unit_of_measurement: h
              mode: box
        nozzle_1_snooze_helper:
          name: "Düse 1 Snooze / Nozzle 1 Snooze (Optional)"
          description: >-
            input_datetime Helper (Datum + Uhrzeit) zum Zurückstellen
            der Wartungserinnerung für Düse 1.

            input_datetime helper (date + time) to postpone the
            maintenance reminder for nozzle 1.
          default: ""
          selector:
            entity:
              domain:
                - input_datetime
              multiple: false
        nozzle_2_snooze_helper:
          name: "Düse 2 Snooze / Nozzle 2 Snooze (Optional)"
          description: >-
            input_datetime Helper zum Zurückstellen der
            Wartungserinnerung für Düse 2.

            input_datetime helper to postpone the maintenance
            reminder for nozzle 2.
          default: ""
          selector:
            entity:
              domain:
                - input_datetime
              multiple: false
        nozzle_1_reset_button:
          name: "Düse 1 Reset-Schalter / Nozzle 1 Reset Button (Optional)"
          description: >-
            input_button Helper. Durch Betätigung wird eine
            Sicherheitsabfrage auf das Handy geschickt.
            Bei Bestätigung wird der Betriebsstundenzähler
            der Düse 1 auf 0 zurückgesetzt.
            Alternativ kann der Zähler jederzeit manuell
            über den input_number Helper auf 0 gesetzt werden.

            input_button helper. When pressed, a confirmation
            notification is sent to your phone. If confirmed,
            the nozzle 1 operating hours counter resets to 0.
            Alternatively, you can manually set the counter
            to 0 via the input_number helper at any time.
          default: []
          selector:
            entity:
              domain:
                - input_button
              multiple: false
        nozzle_2_reset_button:
          name: "Düse 2 Reset-Schalter / Nozzle 2 Reset Button (Optional)"
          description: >-
            input_button Helper. Durch Betätigung wird eine
            Sicherheitsabfrage auf das Handy geschickt.
            Bei Bestätigung wird der Betriebsstundenzähler
            der Düse 2 auf 0 zurückgesetzt.
            Alternativ kann der Zähler jederzeit manuell
            über den input_number Helper auf 0 gesetzt werden.

            input_button helper. When pressed, a confirmation
            notification is sent to your phone. If confirmed,
            the nozzle 2 operating hours counter resets to 0.
            Alternatively, you can manually set the counter
            to 0 via the input_number helper at any time.
          default: []
          selector:
            entity:
              domain:
                - input_button
              multiple: false

  source_url: https://raw.githubusercontent.com/Knartzpirat/ha-bambu-print-tracker/main/bambu_update_main.yaml

