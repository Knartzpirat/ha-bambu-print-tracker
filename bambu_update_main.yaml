                    data:
                      tag: bambu_nozzle_2_reset_{{ printer_status_var }}

      # -----------------------------------------------------------------------
      # Druck gestartet
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Print Started
        sequence:
          - choose:
              - conditions: "{{ enable_energy_tracking_var and start_kwh_helper_var != '' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ start_kwh_helper_var }}"
                    data:
                      value: "{{ states(energy_sensor_var) | string | replace(',', '.') | float(0) }}"
          # --- Filament-Log-Helper leeren ---
          - choose:
              - conditions: "{{ filament_log_helper_var != '' }}"
                sequence:
                  - action: input_text.set_value
                    target:
                      entity_id: "{{ filament_log_helper_var }}"
                    data:
                      value: ""

      # -----------------------------------------------------------------------
      # Filament-Wechsel: Material im Helper sammeln (dedupliziert)
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Filament_Change
        sequence:
          - choose:
              - conditions: "{{ filament_log_helper_var != '' }}"
                sequence:
                  - variables:
                      current_filament: "{{ states(printer_active_slot_sensor_var) }}"
                      existing_filaments: "{{ states(filament_log_helper_var) }}"
                      already_logged: >-
                        {{ current_filament in (existing_filaments.split(', ') if existing_filaments != '' else []) }}
                  - choose:
                      - conditions: "{{ not already_logged }}"
                        sequence:
                          - action: input_text.set_value
                            target:
                              entity_id: "{{ filament_log_helper_var }}"
                            data:
                              value: >-
                                {{ (existing_filaments ~ ', ' ~ current_filament) if existing_filaments != '' else current_filament }}

      # -----------------------------------------------------------------------
      # Düse 1 – Heizung gestartet → Zeitstempel speichern
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Nozzle_1_Heat_Start
        sequence:
          - action: input_number.set_value
            target:
              entity_id: "{{ nozzle_1_heating_start_var }}"
            data:
              value: "{{ now().timestamp() | round(0) }}"

      # -----------------------------------------------------------------------
      # Düse 1 – Heizung gestoppt → Stunden berechnen und addieren
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Nozzle_1_Heat_Stop
        sequence:
          - variables:
              elapsed_h: >-
                {{ ((now().timestamp() - states(nozzle_1_heating_start_var) | float(0)) / 3600) | round(2) }}
          - choose:
              - conditions: "{{ nozzle_1_hours_helper_var != '' and elapsed_h > 0 }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ nozzle_1_hours_helper_var }}"
                    data:
                      value: >-
                        {{ (states(nozzle_1_hours_helper_var) | float(0) + elapsed_h) | round(2) }}
          - action: input_number.set_value
            target:
              entity_id: "{{ nozzle_1_heating_start_var }}"
            data:
              value: "0"

      # -----------------------------------------------------------------------
      # Düse 2 – Heizung gestartet → Zeitstempel speichern
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: Nozzle_2_Heat_Start
        sequence:
          - action: input_number.set_value
            target:
              entity_id: "{{ nozzle_2_heating_start_var }}"
            data:
